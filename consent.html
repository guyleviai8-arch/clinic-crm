
<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס הסכמה | ד"ר קליניק</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#F4F8FB;color:#1A2332;min-height:100vh;direction:rtl}
.hero{background:linear-gradient(135deg,#154F7A,#1B6CA8,#4DB8C8);padding:28px 20px 36px;text-align:center}
.hero-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75)}
.hero-divider{width:36px;height:2px;background:#C9A84C;margin:12px auto}
.hero-tag{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;padding:4px 14px;border-radius:99px}
.wrap{max-width:600px;margin:-16px auto 0;padding:0 16px 40px;position:relative;z-index:1}
.card{background:#fff;border:1px solid #DDE8F0;border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(27,108,168,.05)}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#1A2332}
.icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-blue{background:#E8F4FD;color:#1B6CA8}
.icon-green{background:#E8F7F2;color:#2AA876}
.icon-red{background:#FCEBEB;color:#E24B4A}
.consent-text{font-size:13px;line-height:1.9;color:#3A4A5E;background:#F8FBFE;border:1px solid #DDE8F0;border-radius:10px;padding:18px;max-height:320px;overflow-y:auto}
.consent-text h4{font-size:14px;color:#1A2332;margin:14px 0 6px;font-weight:600}
.consent-text h4:first-child{margin-top:0}
.consent-text p{margin-bottom:10px}
.consent-text ul{padding-right:20px;margin-bottom:10px}
.consent-text li{margin-bottom:6px}
.field{margin-bottom:14px}
.label{font-size:12px;color:#5A6A7E;margin-bottom:6px;display:block;font-weight:500}
input,select{width:100%;padding:12px 14px;border:1.5px solid #DDE8F0;border-radius:10px;font-size:15px;font-family:'Heebo',sans-serif;background:#fff;color:#1A2332;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:#1B6CA8}
.canvas-wrap{border:1.5px solid #DDE8F0;border-radius:12px;overflow:hidden;position:relative;background:#fff;cursor:crosshair;touch-action:none}
canvas{display:block;width:100%;height:160px}
.canvas-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;pointer-events:none;transition:opacity .2s}
.canvas-placeholder span{font-size:13px;color:#B0C0D0}
.canvas-actions{display:flex;gap:8px;margin-top:8px}
.clear-btn{padding:8px 14px;border-radius:8px;border:1.5px solid #DDE8F0;background:#fff;font-size:12px;color:#5A6A7E;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:6px}
.clear-btn:hover{border-color:#1B6CA8;color:#1B6CA8}
.submit-btn{width:100%;padding:16px;border-radius:13px;border:none;background:linear-gradient(135deg,#1B6CA8,#4DB8C8);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(27,108,168,.3);margin-top:4px}
.submit-btn:active{opacity:.88}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:#FEF0F0;border:1px solid #FBBABA;border-radius:10px;padding:12px 14px;font-size:13px;color:#C0392B;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.checkbox-wrap{display:flex;align-items:flex-start;gap:12px;background:#F4F8FB;border-radius:10px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.checkbox-wrap:has(input:checked){background:#E8F7F2;border-color:#2AA876}
.checkbox-wrap:has(input:checked) .checkbox-label{color:#085041;font-weight:500}
.checkbox-wrap:has(input:checked)::after{content:'אושר';color:#2AA876;font-weight:700;font-size:13px;margin-right:auto;white-space:nowrap;align-self:center}
.checkbox-wrap input[type=checkbox]{display:none}
.custom-box{width:24px;height:24px;border:2px solid #B0C0D0;border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .2s}
.checkbox-wrap:has(input:checked) .custom-box{background:#2AA876;border-color:#2AA876}
.custom-box::after{content:'✓';color:#fff;font-size:16px;font-weight:700;opacity:0;transition:opacity .15s}
.checkbox-wrap:has(input:checked) .custom-box::after{opacity:1}
.checkbox-label{font-size:13px;line-height:1.6;color:#1A2332}
.success-page{text-align:center;padding:20px 0 40px}
.success-hero{background:linear-gradient(135deg,#2AA876,#4DB8C8);border-radius:20px;padding:32px 24px;margin-bottom:20px;color:#fff}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-size:22px;font-weight:700;margin-bottom:6px}
.success-sub{font-size:14px;opacity:.85}
.success-card{background:#fff;border:1px solid #DDE8F0;border-radius:16px;padding:20px;margin-bottom:16px;text-align:right}
.signed-img{border:2px solid #DDE8F0;border-radius:10px;width:100%;max-height:120px;object-fit:contain;margin-top:12px;background:#F8FBFE}
.loading{text-align:center;padding:40px;color:#5A6A7E;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #DDE8F0;border-top-color:#1B6CA8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.patient-info{background:#E8F4FD;border-radius:10px;padding:14px;margin-bottom:14px}
.patient-name{font-size:16px;font-weight:600;color:#1B6CA8}
.patient-sub{font-size:12px;color:#5A6A7E;margin-top:3px}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #DDE8F0;color:#B0C0D0;background:#fff;transition:all .2s}
.step-circle.active{background:#1B6CA8;border-color:#1B6CA8;color:#fff}
.step-circle.done{background:#2AA876;border-color:#2AA876;color:#fff}
.step-text{font-size:10px;color:#B0C0D0;text-align:center}
.step-text.active{color:#1B6CA8;font-weight:600}
.step-line{flex:1;height:2px;background:#DDE8F0;margin-bottom:14px}
.step-line.done{background:#2AA876}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-name">ד"ר קליניק</div>
  <div class="hero-sub">קליניקה לרפואה אסתטית</div>
  <div class="hero-divider"></div>
  <div class="hero-tag">✍️ טופס הסכמה לטיפול</div>
</div>

<div class="wrap">
  <div id="content"><div class="loading"><div class="spinner"></div><br><br>טוען…</div></div>
</div>

<script>
const SUPABASE_URL='https://vizqigecvjpcfrorwowm.supabase.co';
const SUPABASE_KEY='sb_publishable_EhhQfiQA2cUDA7BA68ZPWg_0bVeHtlA';

let clientId=null;
let clientData=null;
let canvas,ctx,isDrawing=false,hasSig=false,lastX=0,lastY=0;
let step=1;

function getParam(name){return new URLSearchParams(window.location.search).get(name)}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function init(){
  clientId=getParam('client');
  if(!clientId){showError('קישור לא תקין');return}
  const res=await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${clientId}&select=*`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  const clients=await res.json();
  if(!clients||!clients.length){showError('לקוח לא נמצא');return}
  clientData=clients[0];
  if(clientData.consent){renderAlreadySigned();return}
  renderStep1();
}

function showError(msg){
  document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:32px">
    <div style="font-size:40px;margin-bottom:12px">❌</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:8px">${msg}</div>
    <div style="font-size:13px;color:#888">פנה לקליניקה לקבלת קישור חדש.</div>
  </div>`;
}

function stepBar(active){
  const steps=['פרטים','קריאת טופס','חתימה'];
  return`<div class="step-bar">
    ${steps.map((s,i)=>{
      const n=i+1;
      const cls=n<active?'done':n===active?'active':'';
      const tcls=n===active?'active':'';
      return`${i>0?`<div class="step-line ${n<=active?'done':''}"></div>`:''}
      <div class="step-item">
        <div class="step-circle ${cls}">${n<active?'✓':n}</div>
        <div class="step-text ${tcls}">${s}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderAlreadySigned(){
  document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:32px">
    <div style="font-size:48px;margin-bottom:12px">✅</div>
    <div style="font-size:17px;font-weight:600;margin-bottom:8px">טופס ההסכמה כבר נחתם</div>
    <div style="font-size:13px;color:#888">תודה ${escHtml(clientData.name)}! החתימה שלך כבר נמצאת בתיק.</div>
  </div>`;
}

function renderStep1(){
  document.getElementById('content').innerHTML=`
    ${stepBar(1)}
    <div class="card">
      <div class="card-title"><div class="icon icon-blue">👤</div>אימות פרטים</div>
      <div class="patient-info">
        <div class="patient-name">${escHtml(clientData.name)}</div>
        <div class="patient-sub">אנא אמת/י שהפרטים נכונים לפני החתימה</div>
      </div>
      <div class="field"><label class="label">שם מלא</label><input type="text" id="v-name" value="${escHtml(clientData.name)}" dir="rtl"></div>
      <div class="field"><label class="label">תאריך לידה</label><input type="date" id="v-dob" value="${clientData.dob||''}"></div>
      <div class="field"><label class="label">טלפון</label><input type="tel" inputmode="numeric" id="v-phone" value="${escHtml(clientData.phone||'')}"></div>
    </div>
    <div id="err1"></div>
    <button class="submit-btn" onclick="goStep2()">המשך לקריאת הטופס ←</button>`;
}

function renderStep2(){
  document.getElementById('content').innerHTML=`
    ${stepBar(2)}
    <div class="card">
      <div class="card-title"><div class="icon icon-blue">📋</div>טופס הסכמה לטיפול אסתטי</div>
      <div class="consent-text">
        <h4>הצהרת המטופל/ת</h4>
        <p>אני הח"מ, <strong>${escHtml(clientData.name)}</strong>, מצהיר/ה בזאת כי קיבלתי הסבר מלא ומפורט מהצוות הרפואי של ד"ר קליניק לגבי הטיפול האסתטי המיועד לי, לרבות מהות הטיפול, יתרונותיו, חלופותיו, הסיכונים הכרוכים בו והתוצאות הצפויות ממנו.</p>

        <h4>אחריות המטופל/ת</h4>
        <ul>
          <li>מסרתי פרטים מלאים ומדויקים על מצבי הרפואי, תרופות שאני נוטל/ת, אלרגיות וכל מידע רפואי רלוונטי.</li>
          <li>אני מודע/ת כי הסתרת מידע רפואי עלולה לסכן את בריאותי ולגרום לתוצאות בלתי צפויות.</li>
          <li>קיבלתי הסבר על חלופות לטיפול המוצע ועל האפשרות להימנע מהטיפול.</li>
        </ul>

        <h4>הגבלת אחריות הקליניקה</h4>
        <p>ד"ר קליניק אינה אחראית לתוצאות הטיפול במקרים הבאים:</p>
        <ul>
          <li>אי-מסירת מידע רפואי מלא ומדויק על ידי המטופל/ת.</li>
          <li>אי-עמידה בהוראות הטיפול לאחר הפרוצדורה.</li>
          <li>תגובות אינדיווידואליות בלתי צפויות לטיפול.</li>
          <li>גורמים חיצוניים שאינם בשליטת הקליניקה.</li>
          <li>ציפיות לא מציאותיות שלא הוסכמו מראש בכתב.</li>
        </ul>

        <h4>סיכונים ידועים</h4>
        <ul>
          <li>כאב קל, אדמומיות, נפיחות וחבורות זמניות באזור הטיפול.</li>
          <li>במקרים נדירים — תגובה אלרגית לחומרים המשמשים בטיפול.</li>
          <li>אסימטריה זמנית שעשויה לדרוש טיפול נוסף.</li>
          <li>תוצאות הטיפול משתנות בין אדם לאדם ואינן מובטחות.</li>
        </ul>

        <h4>צילום ותיעוד</h4>
        <p>אני מסכים/ה כי הקליניקה תוכל לצלם תמונות לפני ואחרי הטיפול לצורכי תיעוד רפואי פנימי בלבד, אלא אם הסכמתי בנפרד לשימוש שיווקי.</p>

        <h4>הצהרה סופית</h4>
        <p>אני מאשר/ת כי קראתי והבנתי את כל האמור לעיל, קיבלתי מענה לכל שאלותיי, וחתימתי להלן מהווה הסכמה מדעת חופשית לביצוע הטיפול.</p>
      </div>
    </div>
    <div class="card">
      <label class="checkbox-wrap" for="agree-check">
        <input type="checkbox" id="agree-check">
        <div class="custom-box"></div>
        <div class="checkbox-label">קראתי את טופס ההסכמה במלואו, הבנתי את תוכנו, ואני מסכים/ה לתנאים המפורטים בו.</div>
      </label>
    </div>
    <div id="err2"></div>
    <div style="display:flex;gap:10px">
      <button class="submit-btn" style="background:#fff;color:#1B6CA8;border:1.5px solid #DDE8F0;box-shadow:none;flex:0 0 auto;width:auto;padding:16px 20px" onclick="step=1;renderStep1()">← חזור</button>
      <button class="submit-btn" style="flex:1" onclick="goStep3()">המשך לחתימה ←</button>
    </div>`;
}

function renderStep3(){
  document.getElementById('content').innerHTML=`
    ${stepBar(3)}
    <div class="card">
      <div class="card-title"><div class="icon icon-green">✍️</div>חתימה אלקטרונית</div>
      <div class="field">
        <label class="label">תאריך חתימה</label>
        <input type="text" value="${new Date().toLocaleDateString('he-IL')}" readonly style="background:#F5F5F5;color:#888;cursor:default">
      </div>
      <label class="label">חתימה (צייר באצבע או עכבר)</label>
      <div class="canvas-wrap">
        <canvas id="sigCanvas" width="800" height="200"></canvas>
        <div class="canvas-placeholder" id="canvasHint">
          <span style="font-size:28px">✍️</span>
          <span>חתום/י כאן</span>
        </div>
      </div>
      <div class="canvas-actions">
        <button class="clear-btn" onclick="clearSig()">🗑️ נקה חתימה</button>
      </div>
    </div>
    <div id="err3"></div>
    <div style="display:flex;gap:10px">
      <button class="submit-btn" style="background:#fff;color:#1B6CA8;border:1.5px solid #DDE8F0;box-shadow:none;flex:0 0 auto;width:auto;padding:16px 20px" onclick="step=2;renderStep2()">← חזור</button>
      <button class="submit-btn" style="flex:1" id="submitBtn" onclick="submitConsent()">✅ שלח וחתום</button>
    </div>`;

  initCanvas();
}

function initCanvas(){
  canvas=document.getElementById('sigCanvas');
  if(!canvas)return;
  ctx=canvas.getContext('2d');
  ctx.strokeStyle='#1A2332';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width;const sy=canvas.height/r.height;
    if(e.touches){return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};}
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
  }

  function startDraw(e){e.preventDefault();isDrawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;}
  function draw(e){e.preventDefault();if(!isDrawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;hasSig=true;const h=document.getElementById('canvasHint');if(h)h.style.opacity='0';}
  function endDraw(){isDrawing=false;}

  canvas.addEventListener('mousedown',startDraw);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',endDraw);
  canvas.addEventListener('mouseleave',endDraw);
  canvas.addEventListener('touchstart',startDraw,{passive:false});
  canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',endDraw);
}

function clearSig(){
  if(ctx)ctx.clearRect(0,0,canvas.width,canvas.height);
  hasSig=false;
  const h=document.getElementById('canvasHint');if(h)h.style.opacity='1';
}

function goStep2(){
  const name=document.getElementById('v-name').value.trim();
  const dob=document.getElementById('v-dob').value;
  const phone=document.getElementById('v-phone').value.trim();
  const err=document.getElementById('err1');
  if(!name||name.length<2||!/[a-zA-Zא-ת]/.test(name)){err.innerHTML='<div class="error-msg">⚠️ נא להזין שם תקין</div>';return}
  if(!dob){err.innerHTML='<div class="error-msg">⚠️ נא למלא תאריך לידה</div>';return}
  const cleanPhone=phone.replace(/[-\s]/g,'');
  if(!phone||!/^0\d{8,9}$/.test(cleanPhone)){err.innerHTML='<div class="error-msg">⚠️ נא להזין מספר טלפון תקין (לדוגמה: 0501234567)</div>';return}
  err.innerHTML='';
  clientData.dob=dob;
  clientData.phone=phone;
  clientData.name=name;
  step=2;renderStep2();window.scrollTo(0,0);
}

function goStep3(){
  const cb=document.getElementById('agree-check');
  if(!cb||!cb.checked){document.getElementById('err2').innerHTML='<div class="error-msg">⚠️ נא לאשר קריאת הטופס</div>';return}
  step=3;renderStep3();window.scrollTo(0,0);
}

async function submitConsent(){
  if(!hasSig){document.getElementById('err3').innerHTML='<div class="error-msg">⚠️ נא לחתום על הטופס</div>';return}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:18px;height:18px;display:inline-block"></div> שולח…';

  const sigData=canvas.toDataURL('image/png');

  // Upload signature to Supabase Storage
  let sigUrl='';
  try{
    const blob=await(await fetch(sigData)).blob();
    const filename=`sig-${clientId}-${Date.now()}.png`;
    const upRes=await fetch(`${SUPABASE_URL}/storage/v1/object/clinic-photos/${filename}`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'image/png','x-upsert':'true'},
      body:blob
    });
    if(upRes.ok)sigUrl=`${SUPABASE_URL}/storage/v1/object/public/clinic-photos/${filename}`;
  }catch(e){}

  // Update client record
  const notesAdd=`\n[טופס הסכמה נחתם ב-${new Date().toLocaleDateString('he-IL')}]`;
  await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${clientId}`,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({consent:true,notes:(clientData.notes||'')+notesAdd,signature_url:sigUrl,dob:clientData.dob||null,phone:clientData.phone||clientData.phone,name:clientData.name})
  });

  // Send confirmation email via Edge Function
  if(clientData.email){
    try{
      await fetch(`${SUPABASE_URL}/functions/v1/send-email`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
        body:JSON.stringify({
          to:clientData.email,
          subject:'אישור חתימה על טופס הסכמה — ד"ר קליניק',
          html:`<div dir="rtl" style="font-family:Arial,sans-serif;max-width:560px;margin:0 auto;padding:24px;color:#1A2332">

              <p style="color:rgba(255,255,255,.8);margin:4px 0 0;font-size:13px">קליניקה לרפואה אסתטית</p>
            </div>
            <p>שלום <strong>${escHtml(clientData.name)}</strong>,</p>
            <p>תודה שחתמת על טופס ההסכמה לטיפול אסתטי. מצורף העתק מלא של הטופס עליו חתמת, לתיעודך.</p>
            <div style="background:#E8F4FD;border-radius:10px;padding:16px;margin:16px 0">
              <p style="margin:0 0 6px"><strong>שם:</strong> ${escHtml(clientData.name)}</p>
              <p style="margin:0"><strong>תאריך חתימה:</strong> ${new Date().toLocaleDateString('he-IL')}</p>
            </div>
            <div style="background:#F8FBFE;border:1px solid #DDE8F0;border-radius:10px;padding:18px;font-size:13px;line-height:1.8;color:#3A4A5E">
              <h3 style="color:#1A2332;font-size:15px;margin:0 0 10px">טופס הסכמה לטיפול אסתטי</h3>
              <p><strong>הצהרת המטופל/ת:</strong> אני הח"מ, ${escHtml(clientData.name)}, מצהיר/ה כי קיבלתי הסבר מלא ומפורט מהצוות הרפואי של ד"ר קליניק לגבי הטיפול האסתטי המיועד לי, לרבות מהותו, יתרונותיו, חלופותיו, הסיכונים והתוצאות הצפויות.</p>
              <p><strong>אחריות המטופל/ת:</strong> מסרתי פרטים מלאים ומדויקים על מצבי הרפואי, תרופות, אלרגיות וכל מידע רלוונטי. אני מודע/ת כי הסתרת מידע עלולה לסכן את בריאותי. קיבלתי הסבר על חלופות ועל האפשרות להימנע מהטיפול.</p>
              <p><strong>הגבלת אחריות הקליניקה:</strong> ד"ר קליניק אינה אחראית לתוצאות במקרים של אי-מסירת מידע מלא, אי-עמידה בהוראות לאחר הטיפול, תגובות אינדיווידואליות בלתי צפויות, גורמים חיצוניים שאינם בשליטת הקליניקה, או ציפיות לא מציאותיות שלא הוסכמו מראש בכתב.</p>
              <p><strong>סיכונים ידועים:</strong> כאב קל, אדמומיות, נפיחות וחבורות זמניות; במקרים נדירים תגובה אלרגית; אסימטריה זמנית; תוצאות משתנות בין אדם לאדם ואינן מובטחות.</p>
              <p><strong>הצהרה סופית:</strong> קראתי והבנתי את כל האמור לעיל, קיבלתי מענה לשאלותיי, וחתימתי מהווה הסכמה מדעת חופשית לביצוע הטיפול.</p>
            </div>
            ${sigUrl?`<div style="margin-top:20px;text-align:center">
              <div style="font-size:12px;color:#5A6A7E;margin-bottom:8px">חתימת המטופל/ת:</div>
              <img src="${sigUrl}" style="max-width:280px;border:1.5px solid #DDE8F0;border-radius:8px;background:#fff" alt="חתימה">
              <div style="font-size:11px;color:#888;margin-top:6px">נחתם דיגיטלית בתאריך ${new Date().toLocaleDateString('he-IL')}</div>

            <hr style="border:none;border-top:1px solid #DDE8F0;margin:24px 0">
            <p style="font-size:11px;color:#aaa;text-align:center">ד"ר קליניק | קליניקה לרפואה אסתטית</p>
          </div>`
        })
      });
    }catch(e){}
  }

  renderSuccess(sigData);
}

  document.getElementById('content').innerHTML=`
    <div class="success-page">
      <div class="success-hero">
        <div class="success-icon">✅</div>

      <div style="font-size:13px;color:#5A6A7E;line-height:1.7;text-align:center">

        ${clientData.email?'אימייל אישור נשלח לכתובתך.':''}<br>

}

init();
</script>
