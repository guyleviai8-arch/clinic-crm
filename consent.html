*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#F4F8FB;color:#1A2332;min-height:100vh}
.lang-switch{position:absolute;top:14px;left:14px;z-index:20}
.lang-toggle{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);color:#fff;font-size:12px;padding:7px 12px;border-radius:99px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s}
.lang-toggle:hover{background:rgba(255,255,255,.3)}
.lang-toggle .chev{font-size:9px;opacity:.8;transition:transform .2s}
.lang-switch.open .chev{transform:rotate(180deg)}
.lang-menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);overflow:hidden;min-width:150px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .18s}
.lang-switch.open .lang-menu{opacity:1;visibility:visible;transform:translateY(0)}
.lang-item{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;font-size:13px;color:#1A2332;font-family:'Heebo',sans-serif;transition:background .12s;white-space:nowrap;direction:ltr}
.lang-item:hover{background:#F0F6FC}
.lang-item.active{background:#E8F4FD;font-weight:600;color:#1B6CA8}
.lang-item .check{margin-left:auto;color:#1B6CA8}
.hero{position:relative}
.hero{background:linear-gradient(135deg,#154F7A,#1B6CA8,#4DB8C8);padding:28px 20px 36px;text-align:center}
.hero-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75)}
.hero-divider{width:36px;height:2px;background:#C9A84C;margin:12px auto}
.hero-tag{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;padding:4px 14px;border-radius:99px}
.wrap{max-width:600px;margin:-16px auto 0;padding:0 16px 40px;position:relative;z-index:1}
.card{background:#fff;border:1px solid #DDE8F0;border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(27,108,168,.05)}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#1A2332}
.icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-blue{background:#E8F4FD;color:#1B6CA8}
.icon-green{background:#E8F7F2;color:#2AA876}
.icon-red{background:#FCEBEB;color:#E24B4A}
.consent-text{font-size:13px;line-height:1.9;color:#3A4A5E;background:#F8FBFE;border:1px solid #DDE8F0;border-radius:10px;padding:18px;max-height:320px;overflow-y:auto}
.consent-text h4{font-size:14px;color:#1A2332;margin:14px 0 6px;font-weight:600}
.consent-text h4:first-child{margin-top:0}
.consent-text p{margin-bottom:10px}
.consent-text ul{padding-right:20px;margin-bottom:10px}
.consent-text li{margin-bottom:6px}
.field{margin-bottom:14px}
.label{font-size:12px;color:#5A6A7E;margin-bottom:6px;display:block;font-weight:500}
input,select{width:100%;padding:12px 14px;border:1.5px solid #DDE8F0;border-radius:10px;font-size:15px;font-family:'Heebo',sans-serif;background:#fff;color:#1A2332;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:#1B6CA8}
.canvas-wrap{border:1.5px solid #DDE8F0;border-radius:12px;overflow:hidden;position:relative;background:#fff;cursor:crosshair;touch-action:none}
canvas{display:block;width:100%;height:160px}
.canvas-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;pointer-events:none;transition:opacity .2s}
.canvas-placeholder span{font-size:13px;color:#B0C0D0}
.canvas-actions{display:flex;gap:8px;margin-top:8px}
.clear-btn{padding:8px 14px;border-radius:8px;border:1.5px solid #DDE8F0;background:#fff;font-size:12px;color:#5A6A7E;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:6px}
.clear-btn:hover{border-color:#1B6CA8;color:#1B6CA8}
.submit-btn{width:100%;padding:16px;border-radius:13px;border:none;background:linear-gradient(135deg,#1B6CA8,#4DB8C8);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(27,108,168,.3);margin-top:4px}
.submit-btn:active{opacity:.88}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:#FEF0F0;border:1px solid #FBBABA;border-radius:10px;padding:12px 14px;font-size:13px;color:#C0392B;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.checkbox-wrap{display:flex;align-items:flex-start;gap:12px;background:#F4F8FB;border-radius:10px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.checkbox-wrap:has(input:checked){background:#E8F7F2;border-color:#2AA876}
.checkbox-wrap:has(input:checked) .checkbox-label{color:#085041;font-weight:500}
.checkbox-wrap:has(input:checked)::after{content:'אושר';color:#2AA876;font-weight:700;font-size:13px;margin-right:auto;white-space:nowrap;align-self:center}
.checkbox-wrap input[type=checkbox]{display:none}
.custom-box{width:24px;height:24px;border:2px solid #B0C0D0;border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .2s}
.checkbox-wrap:has(input:checked) .custom-box{background:#2AA876;border-color:#2AA876}
.custom-box::after{content:'✓';color:#fff;font-size:16px;font-weight:700;opacity:0;transition:opacity .15s}
.checkbox-wrap:has(input:checked) .custom-box::after{opacity:1}
.checkbox-label{font-size:13px;line-height:1.6;color:#1A2332}
.success-page{text-align:center;padding:20px 0 40px}
.success-hero{background:linear-gradient(135deg,#2AA876,#4DB8C8);border-radius:20px;padding:32px 24px;margin-bottom:20px;color:#fff}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-size:22px;font-weight:700;margin-bottom:6px}
.success-sub{font-size:14px;opacity:.85}
.success-card{background:#fff;border:1px solid #DDE8F0;border-radius:16px;padding:20px;margin-bottom:16px;text-align:right}
.signed-img{border:2px solid #DDE8F0;border-radius:10px;width:100%;max-height:120px;object-fit:contain;margin-top:12px;background:#F8FBFE}
.loading{text-align:center;padding:40px;color:#5A6A7E;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #DDE8F0;border-top-color:#1B6CA8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.patient-info{background:#E8F4FD;border-radius:10px;padding:14px;margin-bottom:14px}
.patient-name{font-size:16px;font-weight:600;color:#1B6CA8}
.patient-sub{font-size:12px;color:#5A6A7E;margin-top:3px}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:20px}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #DDE8F0;color:#B0C0D0;background:#fff;transition:all .2s}
.step-circle.active{background:#1B6CA8;border-color:#1B6CA8;color:#fff}
.step-circle.done{background:#2AA876;border-color:#2AA876;color:#fff}
.step-text{font-size:10px;color:#B0C0D0;text-align:center}
.step-text.active{color:#1B6CA8;font-weight:600}
.step-line{flex:1;height:2px;background:#DDE8F0;margin-bottom:14px}
.step-line.done{background:#2AA876}

function detectBrowserLang(){
  const nav=(navigator.language||navigator.userLanguage||'he').toLowerCase();
  if(nav.startsWith('ru'))return 'ru';
  if(nav.startsWith('ka'))return 'ka';
  if(nav.startsWith('he')||nav.startsWith('iw'))return 'he';
  if(nav.startsWith('en'))return 'en';
  return 'he';
}

  LANG=l;try{localStorage.setItem('clinic_lang',l);}catch(e){}

function applyLang(){
  document.documentElement.lang=LANG;document.body.dir=I18N[LANG].dir;
  const hs=document.getElementById('hero-sub');if(hs)hs.textContent=t('sub');
  const cur=LANGS.find(x=>x.code===LANG);
  const lc=document.getElementById('lang-current');if(lc&&cur)lc.textContent=cur.name;
  const menu=document.getElementById('lang-menu');
  if(menu)menu.innerHTML=LANGS.map(l=>`<div class="lang-item ${l.code===LANG?'active':''}" onclick="event.stopPropagation();setLang('${l.code}')"><span>${l.flag}</span><span>${l.name}</span>${l.code===LANG?'<span class="check">✓</span>':''}</div>`).join('');
}

async function init(){
  clientId=getParam('client');
  formType=getParam('type')||'general';
  if(!FORM_TYPES[formType])formType='general';
  if(!clientId){showError(t('errLink'));return}
  const res=await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'select',table:'clients',filters:[{column:'id',value:clientId}]})
  });
  const cj=await res.json();const clients=cj.data||[];
  if(!clients||!clients.length){showError(t('errClient'));return}
  clientData=clients[0];
  // בדיקה אם הטופס הספציפי הזה כבר נחתם
  const formsRes=await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'select',table:'consent_forms',filters:[{column:'client_id',value:clientId},{column:'form_type',value:formType}]})
  });
  const fj=await formsRes.json();const forms=fj.data||[];
  if(forms&&forms.length){renderAlreadySigned();return}
  renderStep1();
}

    <div style="font-size:13px;color:#888">${t('contactClinic')}</div>
  </div>`;
}

function stepBar(active){
  const steps=I18N[LANG].steps;
  return`<div class="step-bar">
    ${steps.map((s,i)=>{
      const n=i+1;
      const cls=n<active?'done':n===active?'active':'';
      const tcls=n===active?'active':'';
      return`${i>0?`<div class="step-line ${n<=active?'done':''}"></div>`:''}
      <div class="step-item">
        <div class="step-circle ${cls}">${n<active?'✓':n}</div>
        <div class="step-text ${tcls}">${s}</div>
      </div>`;
    }).join('')}
  </div>`;
}

        <ul>

          <li>${t('liab4')}</li>

      <button class="submit-btn" style="flex:1" onclick="goStep3()">${t('continueSign')}</button>

function renderStep3(){
  document.getElementById('content').innerHTML=`
    ${stepBar(3)}
    <div class="card">
      <div class="card-title"><div class="icon icon-green">✍️</div>${t('eSign')}</div>
      <div class="field">
        <label class="label">${t('signDate')}</label>
        <input type="text" value="${new Date().toLocaleDateString('he-IL')}" readonly style="background:#F5F5F5;color:#888;cursor:default">
      </div>
      <label class="label">${t('signLabel')}</label>
      <div class="canvas-wrap">
        <canvas id="sigCanvas" width="800" height="200"></canvas>
        <div class="canvas-placeholder" id="canvasHint">
          <span style="font-size:28px">✍️</span>
          <span>${t('signHere')}</span>
        </div>
      </div>
      <div class="canvas-actions">
        <button class="clear-btn" onclick="clearSig()">${t('clearSig')}</button>
      </div>
    </div>

      <button class="submit-btn" style="background:#fff;color:#1B6CA8;border:1.5px solid #DDE8F0;box-shadow:none;flex:0 0 auto;width:auto;padding:16px 20px" onclick="step=2;renderStep2()">${t('back')}</button>
      <button class="submit-btn" style="flex:1" id="submitBtn" onclick="submitConsent()">${t('submitSign')}</button>
    </div>`;

  initCanvas();

function initCanvas(){
  canvas=document.getElementById('sigCanvas');
  if(!canvas)return;
  ctx=canvas.getContext('2d');
  ctx.strokeStyle='#1A2332';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width;const sy=canvas.height/r.height;
    if(e.touches){return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};}
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
  }

  function startDraw(e){e.preventDefault();isDrawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;}
  function draw(e){e.preventDefault();if(!isDrawing)return;const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;hasSig=true;const h=document.getElementById('canvasHint');if(h)h.style.opacity='0';}
  function endDraw(){isDrawing=false;}

  canvas.addEventListener('mousedown',startDraw);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',endDraw);
  canvas.addEventListener('mouseleave',endDraw);
  canvas.addEventListener('touchstart',startDraw,{passive:false});
  canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',endDraw);
}

function clearSig(){
  if(ctx)ctx.clearRect(0,0,canvas.width,canvas.height);
  hasSig=false;
  const h=document.getElementById('canvasHint');if(h)h.style.opacity='1';
}

function goStep2(){
  const name=document.getElementById('v-name').value.trim();
  const dob=document.getElementById('v-dob').value;
  const phone=document.getElementById('v-phone').value.trim();
  const err=document.getElementById('err1');
  if(!name||name.length<2||!/[a-zA-Zא-ת]/.test(name)){err.innerHTML='<div class="error-msg">'+t('errName')+'</div>';return}
  if(!dob){err.innerHTML='<div class="error-msg">'+t('errDob')+'</div>';return}
  const cleanPhone=phone.replace(/[-\s]/g,'');
  if(!phone||!/^0\d{8,9}$/.test(cleanPhone)){err.innerHTML='<div class="error-msg">'+t('errPhone')+'</div>';return}
  err.innerHTML='';
  clientData.dob=dob;
  clientData.phone=phone;
  clientData.name=name;
  step=2;renderStep2();window.scrollTo(0,0);
}

function goStep3(){
  const cb=document.getElementById('agree-check');
  if(!cb||!cb.checked){document.getElementById('err2').innerHTML='<div class="error-msg">'+t('errAgree')+'</div>';return}
  step=3;renderStep3();window.scrollTo(0,0);
}

async function submitConsent(){
  if(!hasSig){document.getElementById('err3').innerHTML='<div class="error-msg">'+t('errSign')+'</div>';return}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:18px;height:18px;display:inline-block"></div> '+t('sending');

  const sigData=canvas.toDataURL('image/png');

  // Upload signature to Supabase Storage
  let sigUrl='';
  try{
    const blob=await(await fetch(sigData)).blob();
    const filename=`sig-${clientId}-${Date.now()}.png`;
    const upRes=await fetch(`${SUPABASE_URL}/storage/v1/object/clinic-photos/${filename}`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'image/png','x-upsert':'true'},
      body:blob
    });
    if(upRes.ok)sigUrl=`${SUPABASE_URL}/storage/v1/object/public/clinic-photos/${filename}`;
  }catch(e){}

  // Save to consent_forms table (separate record per form type)
  await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'insert',table:'consent_forms',data:{client_id:clientId,form_type:formType,signature_url:sigUrl}})
  });
  // Update client record (mark general consent + save details)
  const notesAdd=`\n[${FORM_TYPES[formType].label} ${t('signedOn')} ${new Date().toLocaleDateString('he-IL')}]`;
  await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'update',table:'clients',filters:[{column:'id',value:clientId}],data:{consent:true,notes:(clientData.notes||'')+notesAdd,signature_url:sigUrl,dob:clientData.dob||null,name:clientData.name,lang:LANG}})
  });

  // Send confirmation email via Edge Function
  if(clientData.email){
    try{
      await fetch(`${SUPABASE_URL}/functions/v1/send-email`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
        body:JSON.stringify({
          to:clientData.email,
          subject:t('emSubject')+' — '+ft('label')+' — ד"ר קליניק',
          html:`<div dir="${I18N[LANG].dir}" style="font-family:Arial,sans-serif;max-width:560px;margin:0 auto;padding:24px;color:#1A2332">
            <div style="background:linear-gradient(135deg,#154F7A,#1B6CA8,#4DB8C8);padding:24px;border-radius:12px;text-align:center;margin-bottom:24px">
              <h2 style="color:#fff;margin:0">ד"ר קליניק</h2>
              <p style="color:rgba(255,255,255,.8);margin:4px 0 0;font-size:13px">${t('emClinicSub')}</p>
            </div>
            <p>${t('emHello')} <strong>${escHtml(clientData.name)}</strong>,</p>
            <p>${t('emThanks')}</p>
            <div style="background:#E8F4FD;border-radius:10px;padding:16px;margin:16px 0">
              <p style="margin:0 0 6px"><strong>${t('emName')}:</strong> ${escHtml(clientData.name)}</p>
              <p style="margin:0"><strong>${t('emSignDate')}:</strong> ${new Date().toLocaleDateString(t('emLocale'))}</p>
            </div>
            <div style="background:#F8FBFE;border:1px solid #DDE8F0;border-radius:10px;padding:18px;font-size:13px;line-height:1.8;color:#3A4A5E">
              <h3 style="color:#1A2332;font-size:15px;margin:0 0 10px">${ft('label')}</h3>
              <p><strong>${t('declaration')}:</strong> ${t('declText').replace('{name}',escHtml(clientData.name)).replace('{clinic}','ד"ר קליניק').replace('{desc}',ft('desc'))}</p>
              <p><strong>${t('responsibility')}:</strong> ${t('resp1')} ${t('resp2')} ${t('resp3')}</p>
              <p><strong>${t('liability')}:</strong> ${t('liabIntro').replace('{clinic}','ד"ר קליניק')} ${t('liab1')} ${t('liab2')} ${t('liab3')} ${t('liab4')} ${t('liab5')}</p>
              <p><strong>${t('risks')}:</strong> ${ft('risks')}</p>
              <p><strong>${t('finalDecl')}:</strong> ${t('finalText')}</p>
            </div>
            ${sigUrl?`<div style="margin-top:20px;text-align:center">
              <div style="font-size:12px;color:#5A6A7E;margin-bottom:8px">${t('patientSig')}</div>
              <img src="${sigUrl}" style="max-width:280px;border:1.5px solid #DDE8F0;border-radius:8px;background:#fff" alt="signature">
              <div style="font-size:11px;color:#888;margin-top:6px">${t('signedOn')} ${new Date().toLocaleDateString(t('emLocale'))}</div>
            </div>`:''}
            <hr style="border:none;border-top:1px solid #DDE8F0;margin:24px 0">
            <p style="font-size:11px;color:#aaa;text-align:center">ד"ר קליניק | ${t('emClinicSub')}</p>
          </div>`
        })
      });
    }catch(e){}
  }

  renderSuccess(sigData);
}

function renderSuccess(sigData){
  document.getElementById('content').innerHTML=`
    <div class="success-page">
      <div class="success-hero">
        <div class="success-icon">✅</div>
        <div class="success-title">${t('signedTitle')}</div>
        <div class="success-sub">${t('thanks')} ${escHtml(clientData.name)}</div>
      </div>
      <div class="success-card">
        <div style="font-size:13px;color:#5A6A7E;margin-bottom:8px">${t('yourSig')}</div>
        <img src="${sigData}" class="signed-img" alt="חתימה">
        <div style="font-size:12px;color:#888;margin-top:8px;text-align:center">${t('signedOn')} ${new Date().toLocaleDateString('he-IL')}</div>
      </div>
      <div style="font-size:13px;color:#5A6A7E;line-height:1.7;text-align:center">
        ${t('savedMsg')}<br>
        ${clientData.email?t('emailSent'):''}<br>
        ${t('seeYou')}
      </div>
    </div>`;
}
