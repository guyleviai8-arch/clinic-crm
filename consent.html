<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס הסכמה | ד"ר אלכסנדר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#1B6CA8;--primary-dark:#154F7A;--accent:#2AA876;--teal:#4DB8C8;--text:#1A2332;--text-sub:#5A6A7E;--border:#DDE8F0;--bg:#F4F8FB;--white:#fff;--gold:#C9A84C}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hero{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--teal));padding:30px 20px 40px;text-align:center}
.hero-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75)}
.hero-divider{width:36px;height:2px;background:var(--gold);margin:12px auto}
.hero-tag{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;padding:4px 14px;border-radius:99px}
.wrap{max-width:540px;margin:-16px auto 0;padding:0 16px 40px;position:relative;z-index:1}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(27,108,168,.05)}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-blue{background:#E8F4FD;color:var(--primary)}
.icon-green{background:#E8F7F2;color:var(--accent)}
.consent-text{font-size:13px;line-height:1.8;color:var(--text-sub);background:#F8FBFE;border:1px solid var(--border);border-radius:10px;padding:16px;max-height:280px;overflow-y:auto;direction:rtl}
.consent-text h4{font-size:14px;color:var(--text);margin-bottom:8px;font-weight:600}
.consent-text p{margin-bottom:10px}
.consent-text ul{padding-right:20px;margin-bottom:10px}
.consent-text li{margin-bottom:4px}
.field{margin-bottom:14px}
.label{font-size:12px;color:var(--text-sub);margin-bottom:6px;display:block;font-weight:500}
input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Heebo',sans-serif;background:#fff;color:var(--text);outline:none;-webkit-appearance:none}
input:focus{border-color:var(--primary)}
.canvas-wrap{border:1.5px solid var(--border);border-radius:12px;overflow:hidden;position:relative;background:#fff;touch-action:none}
canvas{display:block;width:100%;height:180px;cursor:crosshair}
.canvas-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#C5D5E5;font-size:13px;pointer-events:none;transition:opacity .2s}
.canvas-actions{display:flex;gap:8px;margin-top:8px}
.clear-btn{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:12px;color:var(--text-sub);cursor:pointer;font-family:'Heebo',sans-serif}
.clear-btn:hover{border-color:var(--primary);color:var(--primary)}
.submit-btn{width:100%;padding:16px;border-radius:13px;border:none;background:linear-gradient(135deg,var(--primary),var(--teal));color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(27,108,168,.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:#FEF0F0;border:1px solid #FBBABA;border-radius:10px;padding:12px 14px;font-size:13px;color:#C0392B;margin-bottom:12px}
.success-page{text-align:center;padding:20px 0 40px}
.success-hero{background:linear-gradient(135deg,var(--accent),var(--teal));border-radius:20px;padding:32px 24px;margin-bottom:20px;color:#fff}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-size:22px;font-weight:700;margin-bottom:6px}
.success-sub{font-size:14px;opacity:.85}
.signed-img{border:2px solid var(--border);border-radius:12px;width:100%;margin-top:12px}
.loading{text-align:center;padding:40px;color:var(--text-sub)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.info-box{background:#E8F4FD;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-name">ד"ר אלכסנדר</div>
  <div class="hero-sub">קליניקה לרפואה אסתטית</div>
  <div class="hero-divider"></div>
  <div class="hero-tag">טופס הסכמה לטיפול</div>
</div>
<div class="wrap">
  <div id="content"><div class="loading"><div class="spinner"></div><br><br>טוען…</div></div>
</div>
<script>
const SUPABASE_URL='https://vizqigecvjpcfrorwowm.supabase.co';
const SUPABASE_KEY='sb_publishable_EhhQfiQA2cUDA7BA68ZPWg_0bVeHtlA';
const RESEND_KEY='re_6MTEMhFC_HNChj4enmkKPZYbxvubmecaW';

let clientId=null;
let clientData=null;
let canvas,ctx,isDrawing=false,hasSig=false;
let lastX=0,lastY=0;

// קבל client_id מה-URL
function getParam(name){const u=new URLSearchParams(window.location.search);return u.get(name)}

async function sb(table,method='GET',body=null,query=''){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{
    method,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''},
    body:body?JSON.stringify(body):null
  });
  if(!res.ok)return null;
  const txt=await res.text();return txt?JSON.parse(txt):null;
}

function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function init(){
  clientId=getParam('client');
  if(!clientId){showError();return}
  const data=await sb('clients',`?id=eq.${clientId}&select=*`,'GET',null,`?id=eq.${clientId}&select=*`);
  // fix query
  const res=await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${clientId}&select=*`,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
  const clients=await res.json();
  if(!clients||!clients.length){showError();return}
  clientData=clients[0];
  renderForm();
}

function showError(){
  document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:32px"><div style="font-size:40px;margin-bottom:12px">❌</div><div style="font-size:16px;font-weight:500;margin-bottom:8px">קישור לא תקין</div><div style="font-size:13px;color:#888">הקישור שקיבלת אינו תקין או פג תוקפו. פנה לקליניקה.</div></div>`;
}

function renderForm(){
  document.getElementById('content').innerHTML=`
    <div class="info-box">👋 שלום ${escHtml(clientData.name)}, אנא קרא את טופס ההסכמה וחתום למטה.</div>
    <div class="card">
      <div class="card-title"><div class="icon icon-blue">📋</div>טופס הסכמה לטיפול אסתטי</div>
      <div class="consent-text">
        <h4>הסכמה לטיפול רפואי אסתטי</h4>
        <p>אני הח"מ, מאשר/ת בזאת כי קיבלתי הסבר מלא ומפורט מד"ר אלכסנדר לגבי הטיפול האסתטי המיועד לי.</p>
        <h4>הבנת הטיפול:</h4>
        <p>אני מבין/ה כי הטיפול האסתטי כולל שימוש בחומרים רפואיים (כגון בוטוקס, פילרים, חומצה היאלורונית וכד') ומהווה פרוצדורה רפואית.</p>
        <h4>סיכונים אפשריים:</h4>
        <ul>
          <li>כאב קל, אדמומיות או נפיחות באזור הטיפול</li>
          <li>חבורות זמניות שיחלפו תוך מספר ימים</li>
          <li>במקרים נדירים — תגובה אלרגית</li>
          <li>תוצאות הטיפול עשויות להשתנות בין אדם לאדם</li>
        </ul>
        <h4>הצהרת הלקוח:</h4>
        <ul>
          <li>מסרתי פרטים מלאים ומדויקים על מצבי הרפואי</li>
          <li>הודעתי על כל התרופות שאני נוטל/ת</li>
          <li>הודעתי על אלרגיות ידועות</li>
          <li>אני מסכים/ה לקבל את הטיפול מרצוני החופשי</li>
          <li>קיבלתי הסבר על חלופות לטיפול</li>
        </ul>
        <p>אני מאשר/ת כי קראתי והבנתי את כל האמור לעיל וחתימתי להלן מהווה הסכמה מדעת לטיפול.</p>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><div class="icon icon-green">✍️</div>חתימה אלקטרונית</div>
      <div class="field">
        <label class="label">תאריך</label>
        <input type="text" id="sig-date" value="${new Date().toLocaleDateString('he-IL')}" readonly style="background:#F5F5F5;color:#888">
      </div>
      <div class="label">חתימה (צייר עם האצבע או העכבר)</div>
      <div class="canvas-wrap">
        <canvas id="sigCanvas" width="800" height="240"></canvas>
        <div class="canvas-label" id="canvasLabel">חתום כאן</div>
      </div>
      <div class="canvas-actions">
        <button class="clear-btn" onclick="clearSig()">🗑️ נקה חתימה</button>
      </div>
    </div>
    <div id="err"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitConsent()">✓ שלח טופס חתום</button>`;

  // Init canvas
  canvas=document.getElementById('sigCanvas');
  ctx=canvas.getContext('2d');
  ctx.strokeStyle='#1A2332';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';

  // Mouse events
  canvas.addEventListener('mousedown',e=>{isDrawing=true;const r=canvas.getBoundingClientRect();const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;lastX=(e.clientX-r.left)*scaleX;lastY=(e.clientY-r.top)*scaleY;});
  canvas.addEventListener('mousemove',e=>{if(!isDrawing)return;const r=canvas.getBoundingClientRect();const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;const x=(e.clientX-r.left)*scaleX;const y=(e.clientY-r.top)*scaleY;ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;hasSig=true;document.getElementById('canvasLabel').style.opacity='0';});
  canvas.addEventListener('mouseup',()=>isDrawing=false);
  canvas.addEventListener('mouseleave',()=>isDrawing=false);

  // Touch events
  canvas.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;const r=canvas.getBoundingClientRect();const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;lastX=(e.touches[0].clientX-r.left)*scaleX;lastY=(e.touches[0].clientY-r.top)*scaleY;},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!isDrawing)return;const r=canvas.getBoundingClientRect();const scaleX=canvas.width/r.width;const scaleY=canvas.height/r.height;const x=(e.touches[0].clientX-r.left)*scaleX;const y=(e.touches[0].clientY-r.top)*scaleY;ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;hasSig=true;document.getElementById('canvasLabel').style.opacity='0';},{passive:false});
  canvas.addEventListener('touchend',()=>isDrawing=false);
}

function clearSig(){ctx.clearRect(0,0,canvas.width,canvas.height);hasSig=false;document.getElementById('canvasLabel').style.opacity='1';}

async function submitConsent(){
  if(!hasSig){document.getElementById('err').innerHTML='<div class="error-msg">⚠️ נא לחתום על הטופס לפני השליחה</div>';return}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.innerHTML='<div style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-left:8px"></div> שולח…';

  const sigData=canvas.toDataURL('image/png');

  // Save to Supabase
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${clientId}`,{
      method:'PATCH',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},
      body:JSON.stringify({consent:true,notes:(clientData.notes||'')+'\n[טופס הסכמה נחתם ב-'+new Date().toLocaleDateString('he-IL')+']'})
    });
  }catch(e){}

  // Send confirmation email if client has email
  if(clientData.email){
    try{
      await fetch('https://vizqigecvjpcfrorwowm.supabase.co/functions/v1/send-email',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
        body:JSON.stringify({
          to:clientData.email,
          subject:'אישור חתימה על טופס הסכמה — ד"ר אלכסנדר',
          html:`<div dir="rtl" style="font-family:Arial,sans-serif;max-width:500px;margin:0 auto;padding:20px">
            <h2 style="color:#1B6CA8">ד"ר אלכסנדר | קליניקה לרפואה אסתטית</h2>
            <p>שלום ${escHtml(clientData.name)},</p>
            <p>קיבלנו את חתימתך על טופס ההסכמה לטיפול אסתטי.</p>
            <div style="background:#E8F4FD;border-radius:10px;padding:16px;margin:16px 0">
              <p><strong>תאריך חתימה:</strong> ${new Date().toLocaleDateString('he-IL')}</p>
              <p><strong>שם:</strong> ${escHtml(clientData.name)}</p>
            </div>
            <p>תודה על אמונך בנו. נשמח לראותך בקליניקה!</p>
            <hr style="border:1px solid #DDE8F0;margin:20px 0">
            <p style="font-size:12px;color:#888">ד"ר אלכסנדר | קליניקה לרפואה אסתטית</p>
          </div>`
        })
      });
    }catch(e){}
  }

  renderSuccess(sigData);
}

function renderSuccess(sigData){
  document.getElementById('content').innerHTML=`
    <div class="success-page">
      <div class="success-hero">
        <div class="success-icon">✅</div>
        <div class="success-title">טופס ההסכמה נחתם!</div>
        <div class="success-sub">תודה ${escHtml(clientData.name)}</div>
      </div>
      <div class="card">
        <div class="card-title"><div class="icon icon-green">✍️</div>החתימה שלך</div>
        <img src="${sigData}" class="signed-img" alt="חתימה">
        <div style="font-size:12px;color:#888;margin-top:8px;text-align:center">נחתם ב-${new Date().toLocaleDateString('he-IL')}</div>
      </div>
      <div style="font-size:13px;color:#888;line-height:1.6;text-align:center">
        החתימה נשמרה בתיק הרפואי שלך.<br>נשמח לראותך בקליניקה!
      </div>
    </div>`;
}

init();
</script>
</body>
</html>
