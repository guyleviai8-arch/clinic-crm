<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ניהול התור שלי | ד"ר קליניק</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#F4F8FB;color:#1A2332;min-height:100vh;direction:rtl}
.hero{background:linear-gradient(135deg,#154F7A,#1B6CA8,#4DB8C8);padding:28px 20px 36px;text-align:center}
.hero-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75)}
.hero-divider{width:36px;height:2px;background:#C9A84C;margin:12px auto}
.hero-tag{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:12px;padding:4px 14px;border-radius:99px}
.wrap{max-width:600px;margin:-16px auto 0;padding:0 16px 40px;position:relative;z-index:1}
.card{background:#fff;border:1px solid #DDE8F0;border-radius:16px;padding:22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(27,108,168,.05)}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#1A2332}
.icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-blue{background:#E8F4FD;color:#1B6CA8}
.icon-green{background:#E8F7F2;color:#2AA876}
.icon-red{background:#FCEBEB;color:#E24B4A}
.appt-detail{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #F0F5FA}
.appt-detail:last-child{border-bottom:none}
.ad-icon{font-size:20px;width:28px;text-align:center}
.ad-label{font-size:12px;color:#8A9AAE}
.ad-value{font-size:15px;font-weight:500;color:#1A2332}
.field{margin-bottom:14px}
.label{font-size:12px;color:#5A6A7E;margin-bottom:6px;display:block;font-weight:500}
input,select{width:100%;padding:12px 14px;border:1.5px solid #DDE8F0;border-radius:10px;font-size:15px;font-family:'Heebo',sans-serif;background:#fff;color:#1A2332;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:#1B6CA8}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.slot{padding:11px 6px;border:1.5px solid #DDE8F0;border-radius:10px;font-size:14px;cursor:pointer;text-align:center;background:#fff;font-weight:500}
.slot.selected{border-color:#1B6CA8;background:#1B6CA8;color:#fff}
.slot.taken{background:#F4F4F4;color:#C0C0C0;cursor:not-allowed;text-decoration:line-through}
.btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-primary{background:linear-gradient(135deg,#1B6CA8,#4DB8C8);color:#fff;box-shadow:0 4px 16px rgba(27,108,168,.3)}
.btn-danger{background:#fff;color:#E24B4A;border:1.5px solid #F09595}
.btn-secondary{background:#fff;color:#1B6CA8;border:1.5px solid #DDE8F0}
.btn:active{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:#FEF0F0;border:1px solid #FBBABA;border-radius:10px;padding:12px 14px;font-size:13px;color:#C0392B;margin-bottom:12px}
.success-hero{background:linear-gradient(135deg,#2AA876,#4DB8C8);border-radius:20px;padding:32px 24px;margin-bottom:20px;color:#fff;text-align:center}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-size:22px;font-weight:700;margin-bottom:6px}
.success-sub{font-size:14px;opacity:.85}
.status-badge{display:inline-block;font-size:12px;padding:4px 12px;border-radius:99px;font-weight:600}
.status-pending{background:#FFF7E8;color:#B47B00}
.status-confirmed{background:#E8F7F2;color:#085041}
.loading{text-align:center;padding:40px;color:#5A6A7E;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #DDE8F0;border-top-color:#1B6CA8;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-name">ד"ר קליניק</div>
  <div class="hero-sub">קליניקה לרפואה אסתטית</div>
  <div class="hero-divider"></div>
  <div class="hero-tag">📅 ניהול התור שלי</div>
</div>
<div class="wrap">
  <div id="content"><div class="loading"><div class="spinner"></div><br><br>טוען את פרטי התור…</div></div>
</div>

<script>
const SUPABASE_URL='https://vizqigecvjpcfrorwowm.supabase.co';
const SUPABASE_KEY='sb_publishable_EhhQfiQA2cUDA7BA68ZPWg_0bVeHtlA';
const WORK_HOURS=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00'];
const CLOSED_DAYS=[5,6];

let appt=null;
let apptId=null;
let newDate='';
let newTime='';
let takenSlots=[];

function getParam(name){return new URLSearchParams(window.location.search).get(name)}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function localISO(d){const dt=new Date(d);const off=dt.getTimezoneOffset();return new Date(dt.getTime()-off*60000).toISOString().slice(0,10)}
function today(){return localISO(new Date())}
function getMinDate(){const d=new Date();d.setDate(d.getDate()+1);while(CLOSED_DAYS.includes(d.getDay()))d.setDate(d.getDate()+1);return localISO(d);}
function fmtNice(d){if(!d)return'';const[y,m,day]=d.split('-');const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];const dt=new Date(d);const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];return`יום ${days[dt.getDay()]}, ${+day} ${months[+m-1]} ${y}`}

async function init(){
  apptId=getParam('id');
  if(!apptId){showError('קישור לא תקין');return}
  const res=await fetch(`${SUPABASE_URL}/rest/v1/appointments?id=eq.${apptId}&select=*`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  const rows=await res.json();
  if(!rows||!rows.length){showError('התור לא נמצא. ייתכן שכבר בוטל.');return}
  appt=rows[0];
  renderView();
}

function showError(msg){
  document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:32px">
    <div style="font-size:40px;margin-bottom:12px">❌</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:8px">${msg}</div>
    <div style="font-size:13px;color:#888">פנה לקליניקה לפרטים.</div>
  </div>`;
}

function renderView(){
  const stMap={pending:['status-pending','⏳ ממתין לאישור'],confirmed:['status-confirmed','✓ מאושר'],done:['','הסתיים']};
  const[stCls,stLabel]=stMap[appt.status]||['status-confirmed','מאושר'];
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-title"><div class="icon icon-blue">📋</div>פרטי התור שלך</div>
      <div class="appt-detail"><div class="ad-icon">👤</div><div style="flex:1"><div class="ad-label">שם</div><div class="ad-value">${escHtml(appt.client_name)}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">💆</div><div style="flex:1"><div class="ad-label">טיפול</div><div class="ad-value">${escHtml(appt.treatment)}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">📅</div><div style="flex:1"><div class="ad-label">תאריך</div><div class="ad-value">${fmtNice(appt.date)}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">🕐</div><div style="flex:1"><div class="ad-label">שעה</div><div class="ad-value">${appt.time}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">📌</div><div style="flex:1"><div class="ad-label">סטטוס</div><div class="ad-value"><span class="status-badge ${stCls}">${stLabel}</span></div></div></div>
    </div>
    <div class="card">
      <div class="card-title"><div class="icon icon-green">🔄</div>שינוי התור</div>
      <p style="font-size:13px;color:#5A6A7E;margin-bottom:16px;line-height:1.6">רוצה לשנות את מועד התור? בחר תאריך ושעה חדשים והשינוי יעודכן מיד.</p>
      <button class="btn btn-secondary" onclick="showReschedule()">📅 העבר לתאריך אחר</button>
      <button class="btn btn-danger" onclick="showCancel()">❌ ביטול התור</button>
    </div>`;
}

function showReschedule(){
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-title"><div class="icon icon-blue">📅</div>בחירת מועד חדש</div>
      <div id="err"></div>
      <div class="field">
        <label class="label">תאריך חדש</label>
        <input type="date" id="new-date" min="${getMinDate()}" onchange="onDateChange(this.value)">
      </div>
      <div id="slots-area"></div>
    </div>
    <button class="btn btn-primary" id="confirm-btn" onclick="confirmReschedule()" disabled>אשר העברת תור</button>
    <button class="btn btn-secondary" onclick="renderView()">← חזרה</button>`;
}

async function onDateChange(date){
  newDate=date;newTime='';
  const dt=new Date(date);
  if(CLOSED_DAYS.includes(dt.getDay())){
    document.getElementById('slots-area').innerHTML='<div class="error-msg">הקליניקה סגורה בימי שישי ושבת. בחר יום אחר.</div>';
    return;
  }
  document.getElementById('slots-area').innerHTML='<div class="loading"><div class="spinner"></div> טוען שעות פנויות…</div>';
  // בדוק שעות תפוסות
  const res=await fetch(`${SUPABASE_URL}/rest/v1/appointments?date=eq.${date}&select=time,id`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  const rows=await res.json();
  takenSlots=(rows||[]).filter(r=>r.id!==apptId).map(r=>(r.time||'').slice(0,5));
  renderSlots();
}

function renderSlots(){
  let h='<label class="label">בחר שעה פנויה</label><div class="slots-grid">';
  WORK_HOURS.forEach(t=>{
    const taken=takenSlots.includes(t);
    h+=`<div class="slot ${taken?'taken':''} ${newTime===t?'selected':''}" ${taken?'':`onclick="selectSlot('${t}')"`}>${t}</div>`;
  });
  h+='</div>';
  document.getElementById('slots-area').innerHTML=h;
}

function selectSlot(t){
  newTime=t;
  renderSlots();
  document.getElementById('confirm-btn').disabled=false;
}

async function confirmReschedule(){
  if(!newDate||!newTime){document.getElementById('err').innerHTML='<div class="error-msg">נא לבחור תאריך ושעה.</div>';return}
  const btn=document.getElementById('confirm-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:18px;height:18px"></div> מעדכן…';
  const res=await fetch(`${SUPABASE_URL}/rest/v1/appointments?id=eq.${apptId}`,{
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({date:newDate,time:newTime,status:'pending'})
  });
  if(res.ok){
    document.getElementById('content').innerHTML=`
      <div class="success-hero">
        <div class="success-icon">✅</div>
        <div class="success-title">התור הועבר!</div>
        <div class="success-sub">${fmtNice(newDate)} בשעה ${newTime}</div>
      </div>
      <div class="card" style="text-align:center">
        <p style="font-size:14px;color:#5A6A7E;line-height:1.7">המועד החדש ממתין לאישור הקליניקה.<br>נעדכן אותך בקרוב! 😊</p>
      </div>`;
  }else{
    document.getElementById('err').innerHTML='<div class="error-msg">שגיאה בעדכון. נסה שוב.</div>';
    btn.disabled=false;btn.innerHTML='אשר העברת תור';
  }
}

function showCancel(){
  document.getElementById('content').innerHTML=`
    <div class="card" style="text-align:center">
      <div style="font-size:44px;margin-bottom:12px">🤔</div>
      <div style="font-size:17px;font-weight:600;margin-bottom:8px">לבטל את התור?</div>
      <p style="font-size:13px;color:#5A6A7E;margin-bottom:20px;line-height:1.6">${escHtml(appt.treatment)}<br>${fmtNice(appt.date)} בשעה ${appt.time}</p>
      <button class="btn btn-danger" onclick="confirmCancel()">כן, בטל את התור</button>
      <button class="btn btn-secondary" onclick="renderView()">← לא, חזרה</button>
    </div>`;
}

async function confirmCancel(){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/appointments?id=eq.${apptId}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(res.ok){
    document.getElementById('content').innerHTML=`
      <div class="success-hero" style="background:linear-gradient(135deg,#8A9AAE,#B0C0D0)">
        <div class="success-icon">✓</div>
        <div class="success-title">התור בוטל</div>
        <div class="success-sub">מקווים לראותך בפעם אחרת</div>
      </div>
      <div class="card" style="text-align:center">
        <p style="font-size:14px;color:#5A6A7E;line-height:1.7">התור בוטל בהצלחה.<br>לקביעת תור חדש — פנה לקליניקה או השתמש בקישור ההזמנה. 😊</p>
      </div>`;
  }
}

init();
</script>
</body>
</html>
