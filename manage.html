.lang-toggle:hover{background:rgba(255,255,255,.3)}
.lang-toggle .chev{font-size:9px;opacity:.8;transition:transform .2s}
.lang-switch.open .chev{transform:rotate(180deg)}
.lang-menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.18);overflow:hidden;min-width:150px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .18s}
.lang-switch.open .lang-menu{opacity:1;visibility:visible;transform:translateY(0)}
.lang-item{display:flex;align-items:center;gap:9px;padding:11px 14px;cursor:pointer;font-size:13px;color:#1A2332;font-family:'Heebo',sans-serif;transition:background .12s;white-space:nowrap;direction:ltr}

.hero-sub{font-size:13px;color:rgba(255,255,255,.75)}
.hero-divider{width:36px;height:2px;background:#C9A84C;margin:12px auto}

.icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

.icon-green{background:#E8F7F2;color:#2AA876}

.ad-label{font-size:12px;color:#8A9AAE}
.ad-value{font-size:15px;font-weight:500;color:#1A2332}

input:focus,select:focus{border-color:#1B6CA8}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.slot{padding:11px 6px;border:1.5px solid #DDE8F0;border-radius:10px;font-size:14px;cursor:pointer;text-align:center;background:#fff;font-weight:500}
.slot.selected{border-color:#1B6CA8;background:#1B6CA8;color:#fff}

let LANG=localStorage.getItem('clinic_lang')||detectBrowserLang();
function detectBrowserLang(){
  const nav=(navigator.language||navigator.userLanguage||'he').toLowerCase();
  if(nav.startsWith('ru'))return 'ru';
  if(nav.startsWith('ka'))return 'ka';
  if(nav.startsWith('he')||nav.startsWith('iw'))return 'he';
  if(nav.startsWith('en'))return 'en';
  return 'he';
}
if(!I18N[LANG])LANG='he';
function t(key){return (I18N[LANG]&&I18N[LANG][key])||I18N.he[key]||key;}
function toggleLangMenu(){const el=document.getElementById('lang-switch');if(el)el.classList.toggle('open');}
function setLang(l){
  LANG=l;try{localStorage.setItem('clinic_lang',l);}catch(e){}
  const el=document.getElementById('lang-switch');if(el)el.classList.remove('open');
  applyLang();
  if(appt)renderView();
}
function applyLang(){
  document.documentElement.lang=LANG;document.body.dir=I18N[LANG].dir;
  const hs=document.getElementById('hero-sub');if(hs)hs.textContent=t('sub');
  const ht=document.getElementById('hero-tag');if(ht)ht.textContent=t('tag');
  const cur=LANGS.find(x=>x.code===LANG);
  const lc=document.getElementById('lang-current');if(lc&&cur)lc.textContent=cur.name;
  const menu=document.getElementById('lang-menu');
  if(menu)menu.innerHTML=LANGS.map(l=>`<div class="lang-item ${l.code===LANG?'active':''}" onclick="event.stopPropagation();setLang('${l.code}')"><span>${l.flag}</span><span>${l.name}</span>${l.code===LANG?'<span class="check">✓</span>':''}</div>`).join('');
}
document.addEventListener('click',()=>{const el=document.getElementById('lang-switch');if(el)el.classList.remove('open');});

const WORK_HOURS=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00'];
const CLOSED_DAYS=[5,6];

let appt=null;
let apptId=null;
let newDate='';
let newTime='';
let takenSlots=[];

function getParam(name){return new URLSearchParams(window.location.search).get(name)}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function localISO(d){const dt=new Date(d);const off=dt.getTimezoneOffset();return new Date(dt.getTime()-off*60000).toISOString().slice(0,10)}
function today(){return localISO(new Date())}
function getMinDate(){const d=new Date();d.setDate(d.getDate()+1);while(CLOSED_DAYS.includes(d.getDay()))d.setDate(d.getDate()+1);return localISO(d);}
function fmtNice(d){if(!d)return'';const[y,m,day]=d.split('-');const months=I18N[LANG].mLong||I18N.he.mLong;const dt=new Date(d);const days=I18N[LANG].dLong||I18N.he.dLong;return`${I18N[LANG].dayPrefix||''}${days[dt.getDay()]}, ${+day} ${months[+m-1]} ${y}`}

async function init(){
  apptId=getParam('id');
  if(!apptId){showError(t('errLink'));return}
  const res=await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'select',table:'appointments',filters:[{column:'id',value:apptId}]})
  });
  const rj=await res.json();const rows=rj.data||[];
  if(!rows||!rows.length){showError(t('errNotFound'));return}
  appt=rows[0];
  renderView();
}

function showError(msg){
  document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:32px">
    <div style="font-size:40px;margin-bottom:12px">❌</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:8px">${msg}</div>
    <div style="font-size:13px;color:#888">${t('contactClinic')}</div>
  </div>`;
}

  document.getElementById('content').innerHTML=`

      <div class="appt-detail"><div class="ad-icon">💆</div><div style="flex:1"><div class="ad-label">${t('treatment')}</div><div class="ad-value">${escHtml(appt.treatment)}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">📅</div><div style="flex:1"><div class="ad-label">${t('date')}</div><div class="ad-value">${fmtNice(appt.date)}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">🕐</div><div style="flex:1"><div class="ad-label">${t('time')}</div><div class="ad-value">${appt.time}</div></div></div>
      <div class="appt-detail"><div class="ad-icon">📌</div><div style="flex:1"><div class="ad-label">${t('status')}</div><div class="ad-value"><span class="status-badge ${stCls}">${stLabel}</span></div></div></div>
    </div>
    <div class="card">
      <div class="card-title"><div class="icon icon-green">🔄</div>${t('changeAppt')}</div>
      <p style="font-size:13px;color:#5A6A7E;margin-bottom:16px;line-height:1.6">${t('changeDesc')}</p>
      <button class="btn btn-secondary" onclick="showReschedule()">${t('reschedule')}</button>
      <button class="btn btn-danger" onclick="showCancel()">${t('cancel')}</button>
    </div>`;
}

function showReschedule(){
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div class="card-title"><div class="icon icon-blue">📅</div>${t('pickNew')}</div>
      <div id="err"></div>
      <div class="field">
        <label class="label">${t('newDate')}</label>
        <input type="date" id="new-date" min="${getMinDate()}" onchange="onDateChange(this.value)">
      </div>
      <div id="slots-area"></div>
    </div>
    <button class="btn btn-primary" id="confirm-btn" onclick="confirmReschedule()" disabled>${t('confirmChange')}</button>
    <button class="btn btn-secondary" onclick="renderView()">${t('backBtn')}</button>`;
}

async function onDateChange(date){
  newDate=date;newTime='';
  const dt=new Date(date);
  if(CLOSED_DAYS.includes(dt.getDay())){
    document.getElementById('slots-area').innerHTML='<div class="error-msg">'+t('closedDay')+'</div>';
    return;
  }
  document.getElementById('slots-area').innerHTML='<div class="loading"><div class="spinner"></div> '+t('loading')+'</div>';
  // בדוק שעות תפוסות
  const res=await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'select',table:'appointments',select:'time,id,date'})
  });
  const rj=await res.json();const rows=(rj.data||[]).filter(r=>r.date===date);
  takenSlots=rows.filter(r=>r.id!==apptId).map(r=>(r.time||'').slice(0,5));
  renderSlots();
}

function renderSlots(){
  let h='<label class="label">'+t('pickFreeTime')+'</label><div class="slots-grid">';
  WORK_HOURS.forEach(t=>{
    const taken=takenSlots.includes(t);
    h+=`<div class="slot ${taken?'taken':''} ${newTime===t?'selected':''}" ${taken?'':`onclick="selectSlot('${t}')"`}>${t}</div>`;
  });
  h+='</div>';
  document.getElementById('slots-area').innerHTML=h;
}

function selectSlot(t){
  newTime=t;
  renderSlots();
  document.getElementById('confirm-btn').disabled=false;
}

async function confirmReschedule(){
  if(!newDate||!newTime){document.getElementById('err').innerHTML='<div class="error-msg">'+t('errPick')+'</div>';return}
  const btn=document.getElementById('confirm-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:#fff;width:18px;height:18px"></div> '+t('updating');
  const res=await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'update',table:'appointments',filters:[{column:'id',value:apptId}],data:{date:newDate,time:newTime,status:'pending'}})
  });
  if(res.ok){
    document.getElementById('content').innerHTML=`
      <div class="success-hero">
        <div class="success-icon">✅</div>
        <div class="success-title">${t('movedTitle')}</div>
        <div class="success-sub">${fmtNice(newDate)} בשעה ${newTime}</div>
      </div>
      <div class="card" style="text-align:center">
        <p style="font-size:14px;color:#5A6A7E;line-height:1.7">${t('movedDesc')}</p>
      </div>`;
  }else{
    document.getElementById('err').innerHTML='<div class="error-msg">'+t('errUpdate')+'</div>';
    btn.disabled=false;btn.innerHTML=t('confirmChange');
  }
}

function showCancel(){
  document.getElementById('content').innerHTML=`
    <div class="card" style="text-align:center">
      <div style="font-size:44px;margin-bottom:12px">🤔</div>
      <div style="font-size:17px;font-weight:600;margin-bottom:8px">${t('cancelTitle')}</div>
      <p style="font-size:13px;color:#5A6A7E;margin-bottom:20px;line-height:1.6">${escHtml(appt.treatment)}<br>${fmtNice(appt.date)} בשעה ${appt.time}</p>
      <button class="btn btn-danger" onclick="confirmCancel()">${t('cancelYes')}</button>
      <button class="btn btn-secondary" onclick="renderView()">${t('cancelNo')}</button>
    </div>`;
}

async function confirmCancel(){
  const res=await fetch(`${SUPABASE_URL}/functions/v1/clinic-api`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({action:'delete',table:'appointments',filters:[{column:'id',value:apptId}]})
  });
  if(res.ok){
    document.getElementById('content').innerHTML=`
      <div class="success-hero" style="background:linear-gradient(135deg,#8A9AAE,#B0C0D0)">
        <div class="success-icon">✓</div>
        <div class="success-title">${t('cancelledTitle')}</div>
        <div class="success-sub">${t('cancelledSub')}</div>
      </div>
      <div class="card" style="text-align:center">
        <p style="font-size:14px;color:#5A6A7E;line-height:1.7">${t('cancelledDesc')}</p>
      </div>`;
  }
}

applyLang();
init();
</script>
</body>
</html>
