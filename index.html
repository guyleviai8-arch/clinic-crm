
<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ד"ר קליניק | CRM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B6CA8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ד&quot;ר קליניק">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1B6CA8;--primary-dark:#154F7A;--primary-light:#E8F4FD;
  --accent:#2AA876;--accent-light:#E8F7F2;
  --teal:#4DB8C8;--teal-light:#EAF8FA;
  --text:#1A2332;--text-sub:#5A6A7E;
  --border:#E6EDF3;--border-strong:#D6E1EA;
  --bg:#F4F8FB;--white:#fff;--gold:#C9A84C;
  --red:#E24B4A;--red-light:#FCEBEB;--amber:#EF9F27;--amber-light:#FAEEDA;
  --r-sm:10px;--r-md:14px;--r-lg:18px;
  --sh-1:0 1px 2px rgba(26,35,50,.04);
  --sh-2:0 2px 8px rgba(26,35,50,.05),0 1px 2px rgba(26,35,50,.03);
  --sh-3:0 10px 28px rgba(26,35,50,.08),0 2px 6px rgba(26,35,50,.04);
  --sh-4:0 22px 52px rgba(26,35,50,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.003em}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--primary-dark),var(--primary),var(--teal));padding:20px}
.login-box{background:var(--white);border-radius:22px;padding:38px 30px;width:100%;max-width:372px;box-shadow:0 24px 64px rgba(15,27,38,.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-icon{width:58px;height:58px;background:linear-gradient(135deg,var(--primary),var(--teal));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:26px;color:#fff}
.login-logo-text{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.022em}
.login-logo-sub{font-size:12px;color:var(--text-sub);margin-top:2px}
.login-title{font-size:23px;font-weight:700;margin-bottom:5px;letter-spacing:-.025em}
.login-sub{font-size:13px;color:var(--text-sub);margin-bottom:22px}
.login-field{margin-bottom:14px}
.login-label{font-size:12px;color:var(--text-sub);margin-bottom:5px;display:block;font-weight:500}
.login-input{width:100%;padding:14px 15px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);font-size:15px;font-family:'Heebo',sans-serif;background:#FAFAFA;color:var(--text);outline:none;transition:all .15s}
.login-input:focus{border-color:var(--primary);background:var(--white)}
.login-btn{width:100%;padding:15px;border-radius:var(--r-sm);border:none;background:var(--primary);box-shadow:0 4px 14px rgba(27,108,168,.3);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;margin-top:6px}
.login-btn:active{opacity:.88}
.login-err{color:var(--red);font-size:12px;margin-top:10px;display:none;text-align:center;background:var(--red-light);padding:8px 12px;border-radius:8px}

/* APP */
.lang-switch{position:relative;z-index:60}
.lang-toggle{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 10px;border-radius:99px;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;width:100%;justify-content:center}
.lang-toggle:hover{background:var(--white);border-color:var(--primary)}
.lang-toggle .chev{font-size:9px;opacity:.7;transition:transform .2s}
.lang-switch.open .chev{transform:rotate(180deg)}
.lang-menu{position:absolute;bottom:calc(100% + 6px);right:0;left:0;background:var(--white);border-radius:11px;box-shadow:0 6px 24px rgba(0,0,0,.15);overflow:hidden;opacity:0;visibility:hidden;transform:translateY(6px);transition:all .18s;border:1px solid var(--border)}
.lang-switch.open .lang-menu{opacity:1;visibility:visible;transform:translateY(0)}
.lang-item{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;font-size:13px;color:var(--text);transition:background .12s;direction:ltr}
.lang-item:hover{background:var(--bg)}
.lang-item.active{background:var(--primary-light);font-weight:600;color:var(--primary)}
.lang-item .check{margin-left:auto;color:var(--primary)}
.login-lang .lang-menu{bottom:auto;top:calc(100% + 6px);transform:translateY(-6px)}
.login-lang .lang-switch.open .lang-menu{transform:translateY(0)}
.login-lang .lang-switch{min-width:150px}
.app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
.sidebar{width:246px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sb-top{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sb-brand{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.sb-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.sb-name{font-size:14.5px;font-weight:700;color:var(--text);letter-spacing:-.015em}
.sb-ver{font-size:10px;color:var(--text-sub)}
.logout-btn{background:none;border:none;font-size:12px;color:var(--text-sub);cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:4px;padding:4px 0;margin-top:2px}
.logout-btn:hover{color:var(--red)}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:9px 10px 9px 32px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--primary);background:var(--white)}
.search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text-sub)}
.nav-section{padding:14px 12px 0}
.nav-label{font-size:10px;font-weight:700;color:var(--text-sub);letter-spacing:.13em;padding:2px 6px 10px;text-transform:uppercase;opacity:.5}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;color:var(--text-sub);border:1px solid transparent;margin-bottom:4px;transition:background .15s,color .15s;position:relative;font-weight:500}
.nav-item:hover:not(.active){background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item.active::before{content:'';position:absolute;inset-inline-start:0;top:24%;bottom:24%;width:3px;border-radius:2px;background:var(--primary)}
.nav-item.active i{color:var(--primary)}
.nav-item i{font-size:17px;width:20px;text-align:center;color:var(--text-sub)}
.nav-badge{margin-right:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:99px}
.nav-item.active .nav-badge{background:#fff;color:var(--primary)}
.client-list{flex:1;overflow-y:auto;padding:6px 8px}
.ci{display:flex;align-items:center;gap:9px;padding:10px;border-radius:9px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .1s}
.ci:hover,.ci.active{background:var(--bg);border-color:var(--border)}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.ci-meta{min-width:0;flex:1}
.ci-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:11px;color:var(--text-sub);margin-top:1px}
.add-client-btn{margin:6px 10px 10px;padding:10px;border-radius:9px;border:1.5px dashed var(--border);background:transparent;color:var(--text-sub);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;justify-content:center;font-family:'Heebo',sans-serif;transition:all .12s}
.add-client-btn:hover{background:var(--bg);border-color:var(--primary);color:var(--primary)}
.sb-footer{padding:10px 14px;border-top:1px solid var(--border)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:40}
.topbar{display:none;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;flex:1;text-align:center}
.tb-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;color:var(--text-sub)}
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page-pad{padding:26px}
.bottom-nav{display:none;background:var(--white);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bn-row{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;cursor:pointer;border:none;background:none;font-family:'Heebo',sans-serif;color:#aaa;font-size:10px;font-weight:500;min-width:56px}
.bn-item.active{color:var(--primary)}
.bn-item i{font-size:22px}
.bn-dot{position:relative}
.bn-dot-badge{position:absolute;top:-2px;right:-4px;width:8px;height:8px;background:var(--red);border-radius:50%;border:1.5px solid #fff}

/* CLIENT HEADER */
.mh{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--white)}
.mh-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.mh-info{flex:1;min-width:0}
.mh-name{font-size:19px;font-weight:700;letter-spacing:-.022em}
.mh-sub{font-size:12px;color:var(--text-sub);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500;white-space:nowrap}
.b-vip{background:#EEEDFE;color:#3C3489}
.b-new{background:var(--accent-light);color:#085041}
.b-reg{background:#F1EFE8;color:#444}
.b-sens{background:var(--red-light);color:#791F1F}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;background:var(--white);overflow-x:auto;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 13px;font-size:13.5px;color:var(--text-sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-weight:500;transition:color .14s,border-color .14s}
.tab.active{color:var(--text);border-bottom-color:var(--primary);font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}

/* DASHBOARD */
.dash-header{margin-bottom:28px}
.dash-title{font-size:25px;font-weight:700;letter-spacing:-.028em;line-height:1.22}
.dash-sub{font-size:13.5px;color:var(--text-sub);margin-top:6px}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:26px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;position:relative;overflow:hidden;box-shadow:none;transition:transform .18s,box-shadow .18s,border-color .18s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:var(--border-strong)}
.kpi-accent{position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 14px 14px 0}
.kpi-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px}
.kpi-val{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.025em}
.kpi-label{font-size:10.5px;color:var(--text-sub);margin-top:7px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.dash-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh-1)}
.dc-header{padding:17px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dc-title{font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:8px;letter-spacing:-.005em}
.dc-title i{font-size:16px;color:var(--text-sub)}
.dc-action{font-size:12px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:transparent;font-family:'Heebo',sans-serif}
.dc-body{padding:17px 20px}
.today-appt{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg)}
.today-appt:last-child{border-bottom:none;padding-bottom:0}
.ta-time{font-size:13px;font-weight:600;min-width:46px;color:var(--primary)}
.ta-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ta-info{flex:1;min-width:0}
.ta-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ta-treat{font-size:11px;color:var(--text-sub);margin-top:1px}
.ta-badge{font-size:10px;padding:3px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.appt-pending{background:var(--amber-light);color:#633806}
.appt-confirmed{background:var(--accent-light);color:#085041}
.rem-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg)}
.rem-item:last-child{border-bottom:none;padding-bottom:0}
.ri-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ri-body{flex:1;min-width:0}
.ri-text{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-client{font-size:11px;color:var(--text-sub);margin-top:1px}
.overdue-text{color:var(--red);font-size:11px;font-weight:600}
.today-text{color:var(--amber);font-size:11px;font-weight:600}

/* CARDS */
.sec-label{font-size:10.5px;font-weight:700;color:var(--text-sub);letter-spacing:.13em;margin-bottom:12px;text-transform:uppercase;opacity:.72}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 18px;margin-bottom:10px;box-shadow:none;transition:border-color .16s,box-shadow .16s}
.card:hover{border-color:var(--border-strong)}
.card.overdue{border-color:#F09595;background:#FFFAFA}
.card.today-card{border-color:var(--amber);background:#FFFDF5}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg);border-radius:10px;padding:10px 12px}
.stat-val{font-size:23px;font-weight:700;color:var(--text);letter-spacing:-.025em;line-height:1}
.stat-lbl{font-size:11px;color:var(--text-sub);margin-top:2px}
.treat-card{display:flex;gap:12px;align-items:flex-start}
.treat-date{font-size:11px;color:var(--text-sub);white-space:nowrap;padding-top:2px;min-width:54px}
.treat-body{flex:1;min-width:0}
.treat-name{font-size:13px;font-weight:500}
.treat-detail{font-size:12px;color:var(--text-sub);margin-top:3px;line-height:1.5}
.treat-price{font-size:12px;font-weight:600;color:var(--accent);margin-top:4px}
.rem-card{display:flex;align-items:flex-start;gap:10px}
.rem-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.d-red{background:var(--red)}.d-amber{background:var(--amber)}.d-teal{background:var(--accent)}
.rem-body{flex:1}
.rem-text{font-size:13px;font-weight:500}
.rem-due{font-size:11px;color:var(--text-sub);margin-top:2px}
.chip{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;margin:2px}
.skin-chip{background:#F1EFE8;color:#444}
.allergy-chip{background:var(--red-light);color:#791F1F}
.source-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:99px;background:var(--primary-light);color:var(--primary);font-weight:500}
.empty{text-align:center;padding:32px 0;color:#bbb;font-size:13px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-field{display:flex;flex-direction:column;gap:3px}
.info-label{font-size:11px;color:var(--text-sub);font-weight:500}
.info-value{font-size:13px;color:var(--text)}

/* FORMS */
textarea.fi,input.fi,select.fi{width:100%;padding:12px 14px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);font-size:15px;font-family:'Heebo',sans-serif;background:var(--white);color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .14s,box-shadow .14s}
textarea.fi:focus,input.fi:focus,select.fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,108,168,.11)}
textarea.fi:focus,input.fi:focus,select.fi:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(27,108,168,.11)}
.add-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.add-area{margin-top:14px}
.source-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.source-opt{padding:11px 6px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;text-align:center;background:var(--white);transition:all .12s}
.source-opt.selected{border-color:var(--primary);background:var(--primary);color:#fff}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 17px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .12s;border:1.5px solid transparent;white-space:nowrap}
.btn:active{opacity:.82}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--teal));color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(27,108,168,.24);transition:transform .14s,box-shadow .18s}
.btn-primary:hover{box-shadow:0 6px 20px rgba(27,108,168,.3)}
.btn-secondary{background:var(--white);color:var(--text);border-color:var(--border-strong);box-shadow:var(--sh-1)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--white);color:var(--red);border-color:#F09595}
.btn-success{background:var(--accent-light);color:#085041;border-color:#B6E4CC}
.btn-google{background:var(--white);color:#444;border-color:var(--border)}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:9px}

/* CALENDAR */
.cal-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.cal-scroll{flex:1;overflow:hidden;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--white);display:flex;flex-direction:column;box-shadow:var(--sh-2)}
.cal-head{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid var(--border);flex-shrink:0}
.cal-day-hdr{padding:8px 2px;text-align:center;border-left:1px solid var(--border);background:var(--bg)}
.cal-day-hdr:first-child{border-left:none}
.cal-day-name{font-size:10px;font-weight:700;color:var(--text-sub)}
.cal-day-num{font-size:14px;font-weight:500;margin-top:2px}
.cal-body{flex:1;overflow-y:auto}
.cal-row{display:grid;grid-template-columns:48px repeat(7,1fr)}
.cal-time{height:52px;padding:0 4px;display:flex;align-items:flex-start;justify-content:flex-end;border-bottom:1px solid #F0EEE8;border-right:1px solid var(--border)}
.cal-time span{font-size:9px;color:#ccc;padding-top:4px;white-space:nowrap}
.cal-cell{height:52px;border-left:1px solid var(--border);border-bottom:1px solid #F0EEE8;position:relative;cursor:pointer}
.cal-cell:hover{background:var(--primary-light)}
.appt-block{position:absolute;left:1px;right:1px;border-radius:7px;padding:2px 5px;font-size:10px;font-weight:500;cursor:pointer;overflow:hidden;z-index:2;border:1px solid transparent}
.appt-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt-time-label{font-size:9px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-sub)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,27,38,.45);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal{background:var(--white);border-radius:26px 26px 0 0;padding:14px 24px 36px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--sh-4)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.modal-title{font-size:19px;font-weight:700;margin-bottom:22px;display:flex;align-items:center;gap:10px;letter-spacing:-.022em}
.modal-title i{font-size:20px;color:var(--text-sub)}
.fg{margin-bottom:15px}
.fl{font-size:12.5px;color:var(--text-sub);margin-bottom:7px;font-weight:600}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:13px 24px;border-radius:99px;font-size:13.5px;font-weight:500;z-index:300;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh-3)}
.toast.show{opacity:1}

/* LINK BOX */
.link-box{background:var(--primary-light);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.link-box-title{font-size:12px;font-weight:600;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.link-box-url{font-size:12px;color:var(--primary);background:var(--white);padding:8px 10px;border-radius:7px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;word-break:break-all}

/* EDIT FIELD */
.edit-field{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.edit-label{font-size:11px;color:var(--text-sub);font-weight:500;min-width:80px}
.edit-val{font-size:13px;flex:1}
.edit-input{flex:1;padding:7px 10px;border:1.5px solid var(--primary);border-radius:8px;font-size:13px;font-family:'Heebo',sans-serif;outline:none}

@media(min-width:680px){
  .topbar{display:none!important}.bottom-nav{display:none!important}
  .sidebar{position:static!important;transform:none!important}
  .sidebar-overlay{display:none!important}
  .modal-bg{align-items:center;padding:20px}
  .modal{border-radius:16px;max-width:460px;padding:24px}
  .modal-handle{display:none}
  .page-pad{padding:24px}
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .toast{bottom:24px}
}
@media(max-width:679px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:82%;max-width:300px;transform:translateX(-100%);box-shadow:4px 0 20px rgba(0,0,0,.1)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:block;opacity:0;pointer-events:none;transition:opacity .25s}
  .sidebar-overlay.show{opacity:1;pointer-events:auto}
  .topbar{display:flex!important}
  .bottom-nav{display:block!important}
  .main-wrap{display:flex;flex-direction:column;overflow:hidden}
  .page-pad{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .cal-wrap{padding:0 12px 12px}
}

const AUTH_KEY='clinic_crm_auth';

const API_URL=`${SUPABASE_URL}/functions/v1/clinic-api`;
// שומר את סיסמת המנהל בזיכרון בזמן הסשן (לא נחשף בקוד)
let ADMIN_PW='';

async function apiCall(payload){
  const res=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},
    body:JSON.stringify({...payload,username:AUTH_USER,password:ADMIN_PW})
  });
  if(!res.ok)return null;
  const j=await res.json();
  return j;
}

// ממיר query string ישן (?id=eq.X) ל-filters
function parseFilters(query){
  const filters=[];
  if(!query)return filters;
  const q=query.replace(/^\?/,'');
  q.split('&').forEach(part=>{
    if(part.startsWith('order='))return; // מיון מתבצע בצד הלקוח
    const[col,val]=part.split('=');
    if(col&&val&&val.startsWith('eq.')){filters.push({column:col,value:decodeURIComponent(val.slice(3))});}
  });
  return filters;
}

async function sbFetch(table,query=''){
  const r=await apiCall({action:'select',table,select:'*'});
  if(!r||!r.data)return null;
  let rows=r.data;
  // מיון בצד הלקוח לפי ה-query המקורי
  if(query.includes('order=')){
    const m=query.match(/order=([\w]+)\.(asc|desc)/);
    if(m){const[,col,dir]=m;rows.sort((a,b)=>{const av=a[col]||'',bv=b[col]||'';return dir==='desc'?String(bv).localeCompare(String(av)):String(av).localeCompare(String(bv));});}
  }
  return rows;
}

async function sbPost(table,body){
  const r=await apiCall({action:'insert',table,data:body});
  return r&&r.data?r.data:null;
}

async function sbPatch(table,query,body){
  const filters=parseFilters(query);
  const r=await apiCall({action:'update',table,filters,data:body});
  return r&&!r.error;
}

async function sbDelete(table,query){
  const filters=parseFilters(query);
  const r=await apiCall({action:'delete',table,filters});
  return r&&!r.error;
}

// UTILS
function localISO(d){const dt=new Date(d);const off=dt.getTimezoneOffset();const local=new Date(dt.getTime()-off*60000);return local.toISOString().slice(0,10)}
function weekStart(d){
  const dt=new Date(d);
  const startsOn=(I18N[LANG]&&I18N[LANG].weekStartsOn!==undefined)?I18N[LANG].weekStartsOn:0;
  const diff=(dt.getDay()-startsOn+7)%7;
  dt.setDate(dt.getDate()-diff);
  return dt;
}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt}
function fmtDate(d){return localISO(d)}
function today(){return localISO(new Date())}
function fmt(d){if(!d)return'';const[y,m,day]=d.split('-');const M=I18N[LANG].mShort||I18N.he.mShort;return`${+day} ${M[+m-1]}`}
function fmtFull(d){if(!d)return'';const[y,m,day]=d.split('-');const M=I18N[LANG].mLong||I18N.he.mLong;return`${+day} ${M[+m-1]} ${y}`}
function fmtDay(){const days=I18N[LANG].dLong||I18N.he.dLong;const d=new Date();return`${I18N[LANG].dayPrefix||''}${days[d.getDay()]}, ${fmt(today())}`}
function duePri(d){if(!d)return'normal';if(d<today())return'overdue';if(d===today())return'today';return'normal'}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2)}
function getSrc(k){return SOURCES_LIST().find(s=>s.key===k)||null}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getClientName(id){const c=S.clients.find(c=>c.id===id);return c?c.name:'לא ידוע'}
function getClientColor(id){const c=S.clients.find(c=>c.id===id);return c?c.color%PALETTES.length:0}
function allPendingRem(){return S.reminders.filter(r=>!r.done).map(r=>{const c=S.clients.find(x=>x.id===r.client_id);return{...r,clientName:c?c.name:'?'}})}
function getC(){return S.clients.find(c=>c.id===S.activeId)}
function totalRev(c){return S.treatments.filter(t=>t.client_id===c.id).reduce((s,t)=>s+(t.price||0),0)}
function clientTreatments(cid){return S.treatments.filter(t=>t.client_id===cid).sort((a,b)=>b.date.localeCompare(a.date))}
function clientReminders(cid){return S.reminders.filter(r=>r.client_id===cid)}
function clientAppts(cid){return S.appointments.filter(a=>a.client_id===cid).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))}
function pendingRem(c){return clientReminders(c.id).filter(r=>!r.done).length}

function getNotifications(){
  const notes=[];
  // בקשות תור ממתינות
  S.appointments.filter(a=>a.status==='pending').forEach(a=>{
    notes.push({icon:'ti-calendar-clock',color:'#EF9F27',bg:'#FAEEDA',title:t('newApptReq'),sub:`${a.client_name||getClientName(a.client_id)} · ${escHtml(a.treatment)} · ${fmt(a.date)} ${a.time}`,action:`showApptDetail('${a.id}')`});

  upcomingBirthdays().filter(b=>b.diff<=1).forEach(b=>{
    notes.push({icon:'ti-cake',color:'#E0589B',bg:'#FDF0F6',title:b.diff===0?t('bdayToday'):t('bdayTomorrow'),sub:`${b.name}${b.turning?` · ${t('age')} ${b.turning}`:''}`,action:`openClientCard('${b.id}')`});
  });
  // תזכורות שהגיע זמנן (היום/באיחור)
  allPendingRem().filter(r=>duePri(r.due)!=='normal').forEach(r=>{
    const od=duePri(r.due)==='overdue';
    notes.push({icon:'ti-clock',color:od?'#E24B4A':'#EF9F27',bg:od?'#FCEBEB':'#FAEEDA',title:od?t('reminderOverdue'):t('reminderToday'),sub:`${escHtml(r.text)} · ${escHtml(r.clientName)}`,action:`gotoClientReminders('${r.client_id}')`});

function upcomingBirthdays(){
  const today=new Date();
  const result=[];
  S.clients.forEach(c=>{
    if(!c.dob)return;
    const dob=new Date(c.dob);
    if(isNaN(dob))return;
    // יום הולדת השנה
    const thisYear=new Date(today.getFullYear(),dob.getMonth(),dob.getDate());
    let diff=Math.ceil((thisYear-today)/(24*3600*1000));
    if(diff<0){diff+=365;} // עבר השנה — חשב לשנה הבאה
    if(diff<=14){ // בתוך שבועיים
      const turning=today.getFullYear()-dob.getFullYear()+(thisYear<today?1:0);
      let label;
      if(diff===0)label=t('todayBday');
      else if(diff===1)label=t('tomorrow');
      else label=t('inDays',{n:diff});
      result.push({id:c.id,name:c.name,phone:c.phone,color:c.color||0,diff,label,turning});
    }
  });
  return result.sort((a,b)=>a.diff-b.diff);
}
function sendBirthdayWhatsApp(phone,name){
  const cl=S.clients.find(x=>x.name===name&&x.phone===phone);
  const L=(cl&&cl.lang)||'he';
  waOpen(phone, wa(L,'waBday',{name:name}));
}

// ============ ניהול משתמשים ============
const ROLE_META={
  admin:{rank:3,icon:'ti-crown',color:'#8A6A38',bg:'#FAF3E6'},
  staff:{rank:2,icon:'ti-stethoscope',color:'#0B5140',bg:'#E8F7F2'},
  reception:{rank:1,icon:'ti-clipboard-text',color:'#0C447C',bg:'#E8F4FD'}
};
function roleLabel(r){return t(r==='admin'?'roleAdmin':r==='staff'?'roleStaff':'roleReception')}
function assignableRoles(forSelf){
  const r=myRank();
  // editing yourself keeps your own role available; otherwise strictly below you
  return ['reception','staff','admin'].filter(x=>forSelf?ROLE_META[x].rank<=r:ROLE_META[x].rank<r);
}
function canCreateUsers(){return assignableRoles(false).length>0}
function canManage(u){
  if(!ME)return false;
  const tr=ROLE_META[u.role]?ROLE_META[u.role].rank:0;
  if(u.id===ME.id)return true;              // always yourself
  return tr<myRank();                        // strictly below you
}

async function loadUsers(){
  const r=await apiCall({action:'select',table:'users',select:'id,username,name,role,active,created_at'});
  const all=(r&&r.data)?r.data:[];
  // show only people strictly below you — plus yourself
  S.users=all.filter(u=>{
    if(ME&&u.id===ME.id)return true;
    return (ROLE_META[u.role]?ROLE_META[u.role].rank:0)<myRank();
  });
}

function buildUsers(){
  const list=[...S.users].sort((a,b)=>(ROLE_META[b.role]?.rank||0)-(ROLE_META[a.role]?.rank||0));
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px;flex-wrap:wrap">
    <div><div class="dash-title">${t('usersTitle')}</div><div class="dash-sub">${list.length} ${t('users')}</div></div>
    ${canCreateUsers()?`<button class="btn btn-primary" onclick="openUser(null)"><i class="ti ti-user-plus"></i> ${t('newUser')}</button>`:''}
  </div>
  <p style="font-size:13px;color:var(--text-sub);margin-bottom:20px;line-height:1.6">${t('usersHint')}</p>`;

  if(!list.length){h+=`<div class="empty" style="padding:30px 0">—</div>`;return h;}

  h+=list.map(u=>{
    const m=ROLE_META[u.role]||ROLE_META.reception;
    const mine=ME&&u.id===ME.id;
    const editable=canManage(u);
    return `<div class="card" style="display:flex;align-items:center;gap:13px;${u.active?'':'opacity:.55'}">
      <div style="width:42px;height:42px;border-radius:12px;background:${m.bg};color:${m.color};display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ${m.icon}" style="font-size:19px"></i></div>

        </div>
        <div style="font-size:12.5px;color:var(--text-sub);margin-top:3px">@${escHtml(u.username)} · <span style="color:${m.color};font-weight:600">${roleLabel(u.role)}</span></div>

async function saveUser(){
  const u=S.editUser; if(!u)return;
  const isNew=!u.id;
  const name=document.getElementById('u-name').value.trim();
  const username=document.getElementById('u-username').value.trim();
  const password=document.getElementById('u-password').value;
  const roleEl=document.getElementById('u-role');
  const role=roleEl&&!roleEl.disabled?roleEl.value:u.role;
  const activeEl=document.getElementById('u-active');
  const active=activeEl?activeEl.checked:(u.active!==false);
  const err=document.getElementById('u-err');

  if(!username||(isNew&&!password)){err.innerHTML=`<div style="background:var(--red-light);color:var(--red);padding:10px 13px;border-radius:9px;font-size:13px;margin-bottom:10px">${t('uErrFields')}</div>`;return;}

  if(isNew){
    if(S.users.some(x=>x.username.toLowerCase()===username.toLowerCase())){
      err.innerHTML=`<div style="background:var(--red-light);color:var(--red);padding:10px 13px;border-radius:9px;font-size:13px;margin-bottom:10px">${t('uErrExists')}</div>`;return;
    }
    const r=await apiCall({action:'insert',table:'users',data:{username,password,name:name||username,role,active}});
    if(r&&r.data){await loadUsers();S.modal=null;S.editUser=null;renderRoot();toast(t('tUserAdded'));}
    else toast(r&&r.error?t('noPermission'):t('tErrSave'));
  }else{
    const patch={name:name||username,role,active};
    if(password)patch.password=password;
    const r=await apiCall({action:'update',table:'users',filters:[{column:'id',value:u.id}],data:patch});
    if(r&&!r.error){
      // if you changed your own password, keep the session valid
      if(ME&&u.id===ME.id&&password){ADMIN_PW=password;sessionStorage.setItem('clinic_pw',password);}
      await loadUsers();S.modal=null;S.editUser=null;renderRoot();toast(t('tUserUpdated'));
    }else toast(t('noPermission'));
  }
}

async function deleteUser(id){
  if(!confirm(t('confirmDelUser')))return;
  const r=await apiCall({action:'delete',table:'users',filters:[{column:'id',value:id}]});
  if(r&&!r.error){await loadUsers();S.modal=null;S.editUser=null;renderRoot();toast(t('tUserDeleted'));}
  else toast(t('noPermission'));
}

    <button class="btn btn-google btn-sm" onclick="exportWeekToGoogle()"><i class="ti ti-brand-google"></i></button>
  </div>
  <div style="margin-bottom:10px;flex-shrink:0"><div style="position:relative"><i class="ti ti-search" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-sub);font-size:15px"></i><input type="text" placeholder="${t('searchAppt')}" value="${escHtml(S.apptSearch||'')}" oninput="apptSearchInput(this.value)" style="width:100%;padding:9px 34px 9px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:Heebo,sans-serif;outline:none"></div>${S.apptSearch?`<div style="margin-top:8px">${buildApptSearchResults()}</div>`:''}</div>
  <div class="cal-scroll"><div class="cal-head"><div class="cal-day-hdr"></div>`;
  weekDates.forEach((d,i)=>{const isToday=d===todayStr;const[,,day]=d.split('-');const dow=new Date(d+'T00:00:00').getDay();html+=`<div class="cal-day-hdr"><div class="cal-day-name">${days[dow]}</div><div class="cal-day-num">${isToday?`<span style="width:24px;height:24px;background:var(--primary);color:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px">${+day}</span>`:`${+day}`}</div></div>`;});
  html+=`</div><div class="cal-body">`;
  HOURS.forEach(h=>{
    html+=`<div class="cal-row"><div class="cal-time"><span>${String(h).padStart(2,'0')}:00</span></div>`;
    weekDates.forEach(d=>{
      const appts=S.appointments.filter(a=>a.date===d&&parseInt((a.time||'0').split(':')[0])===h);
      let cells='';
      const total=appts.length;
      appts.forEach((a,idx)=>{const p=PALETTES[getClientColor(a.client_id)];const name=a.client_name||getClientName(a.client_id);const mins=parseInt((a.time||'0').split(':')[1])||0;const top=Math.round((mins/60)*52);const ht=Math.max(20,Math.round((a.duration/60)*52)-2);const isPending=a.status==='pending';const w=total>1?(100/total):100;const leftPos=total>1?(idx*w):0;cells+=`<div class="appt-block" style="top:${top}px;height:${ht}px;width:calc(${w}% - 2px);right:calc(${leftPos}% + 1px);left:auto;background:${isPending?'var(--amber-light)':p.bg};color:${isPending?'#633806':p.c};border-color:${isPending?'var(--amber)':p.c+'30'}" onclick="event.stopPropagation();showApptDetail('${a.id}')"><div class="appt-name">${escHtml(name)}${isPending?' ⏳':''}</div><div class="appt-time-label">${a.time} · ${escHtml(a.treatment)}</div></div>`;});
      html+=`<div class="cal-cell" onclick="quickAddAppt('${d}','${String(h).padStart(2,'0')}:00')">${cells}</div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div>`;
  return html;
}

function reClientsList(){

  const treats=clientTreatments(c.id);const rems=clientReminders(c.id);

  const nextAppt=clientAppts(c.id).filter(a=>a.date>=today())[0];
  let h=`<div class="stat-row">${can('money')?`<div class="stat"><div class="stat-val">₪${rev.toLocaleString()}</div><div class="stat-lbl">${t('kpiRevenue')}</div></div>`:''}<div class="stat"><div class="stat-val">${treats.length}</div><div class="stat-lbl">${t('treatments')}</div></div><div class="stat"><div class="stat-val">${pr}</div><div class="stat-lbl">${t('reminders')}</div></div></div>`;

  h+=`<div class="sec-label">${t('clinicalNotes')}</div><div class="card" style="margin-bottom:14px"><div style="font-size:13px;line-height:1.65">${escHtml(c.notes)||`<span style="color:#bbb">${t('noNotesYet')}</span>`}</div></div>`;
  if(last)h+=`<div class="sec-label">${t('lastTreatment')}</div><div class="card treat-card"><div class="treat-date">${fmt(last.date)}</div><div class="treat-body"><div class="treat-name">${escHtml(last.name)}</div><div class="treat-detail">${escHtml(last.provider||'')}${last.dose&&last.dose!=='—'?' · '+escHtml(last.dose):''}</div>${last.price?`<div class="treat-price">₪${last.price.toLocaleString()}</div>`:''}</div></div>`;

function clientForms(cid){
  const c=S.clients.find(x=>x.id===cid);
  const forms=(S.forms||[]).filter(f=>f.client_id===cid);
  // תאימות לאחור: לקוח שחתם במערכת הישנה (signature_url בלי רשומה ב-consent_forms)
  if(c&&c.signature_url&&!forms.some(f=>f.form_type==='general')){
    forms.push({client_id:cid,form_type:'general',signature_url:c.signature_url,signed_at:c.created_at||new Date().toISOString(),legacy:true});

}

        <p style="margin-bottom:10px"><strong>הגבלת אחריות הקליניקה:</strong> ד"ר קליניק אינה אחראית לתוצאות במקרים של אי-מסירת מידע מלא, אי-עמידה בהוראות לאחר הטיפול, תגובות אינדיווידואליות בלתי צפויות, גורמים חיצוניים שאינם בשליטת הקליניקה, או ציפיות לא מציאותיות שלא הוסכמו מראש בכתב.</p>
        <p style="margin-bottom:10px"><strong>סיכונים ידועים — ${ft.desc}:</strong> ${ft.risks}</p>
        <p style="margin-bottom:0"><strong>הצהרה סופית:</strong> קראתי והבנתי את כל האמור לעיל, קיבלתי מענה לשאלותיי, וחתימתי מהווה הסכמה מדעת חופשית לביצוע הטיפול.</p>
      </div>
      ${rec&&rec.signature_url?`<div style="margin-top:16px;text-align:center">
        <div style="font-size:12px;color:var(--text-sub);margin-bottom:8px">${t('patientSig')}</div>
        <img src="${escHtml(rec.signature_url)}" style="max-width:280px;max-height:120px;border:1.5px solid var(--border);border-radius:8px;background:#fff">
        <div style="font-size:11px;color:var(--text-sub);margin-top:6px">${t('signedDigitally')} ${dateStr}</div>

      <div class="ma">

  if(S.modal==='sendform'&&S.sendForm){

      <div style="display:flex;flex-direction:column;gap:8px">

      <div class="ma"><button class="btn btn-secondary" onclick="closeModal()">${t('close')}</button></div>

  }
  if(S.modal&&S.modal.startsWith('editappt-')){
    const aid=S.modal.split('-').slice(1).join('-');
    const a=S.appointments.find(x=>x.id===aid);if(!a)return'';
    return`<div class="modal-bg" onclick="closeModalBg(event)"><div class="modal"><div class="modal-handle"></div>
      <div class="modal-title"><i class="ti ti-edit"></i> ${t('editAppt')}</div>
      <div class="fg"><div class="fl">${t('clientNameReq')}</div><input class="fi" id="ea-name" value="${escHtml(a.client_name||'')}" dir="rtl"></div>
      <div class="fg"><div class="fl">${t('phone')}</div><input class="fi" id="ea-phone" type="tel" value="${escHtml(a.client_phone||'')}"></div>
      <div class="fg"><div class="fl">${t('email')}</div><input class="fi" id="ea-email" type="email" value="${escHtml(a.client_email||'')}"></div>
      <div class="fg"><div class="fl">${t('treatment')}</div><input class="fi" id="ea-treat" value="${escHtml(a.treatment||'')}" dir="rtl"></div>
      <div class="fg"><div class="fl">${t('date')}</div><input class="fi" id="ea-date" type="date" value="${a.date}"></div>
      <div class="fg"><div class="fl">${t('time')}</div><input class="fi" id="ea-time" type="time" value="${a.time}"></div>
      <div class="fg"><div class="fl">${t('durationMin')}</div><input class="fi" id="ea-dur" type="number" value="${a.duration||60}" min="15" max="240"></div>
      <div class="fg"><div class="fl">${t('notes')}</div><textarea class="fi" id="ea-notes" rows="2" dir="rtl">${escHtml(a.notes||'')}</textarea></div>
      <div class="fg"><div class="fl">${t('status')}</div><select class="fi" id="ea-status"><option value="confirmed" ${a.status==='confirmed'?'selected':''}>מאושר</option><option value="pending" ${a.status==='pending'?'selected':''}>ממתין</option><option value="done" ${a.status==='done'?'selected':''}>הסתיים</option></select></div>
      <div class="ma"><button class="btn btn-secondary" onclick="showApptDetail('${aid}')">${t('cancel')}</button><button class="btn btn-primary" onclick="saveEditAppt('${aid}')"><i class="ti ti-device-floppy"></i> ${t('saveChanges')}</button></div>
    </div></div>`;
  }
  if(S.modal&&S.modal.startsWith('appt-')){
    const aid=S.modal.split('-').slice(1).join('-');
    const a=S.appointments.find(x=>x.id===aid);if(!a)return'';
    const cname=a.client_name||getClientName(a.client_id);
    const p=PALETTES[getClientColor(a.client_id)];
    return`<div class="modal-bg" onclick="closeModalBg(event)"><div class="modal"><div class="modal-handle"></div>
      <div class="modal-title"><i class="ti ti-calendar-event"></i> ${t('apptDetails')}</div>
      <div class="card" style="background:${p.bg};border-color:${p.c}30;margin-bottom:16px">
        <div style="font-size:15px;font-weight:600;color:${p.c}">${escHtml(cname)}</div>
        <div style="font-size:13px;color:${p.c};opacity:.8;margin-top:4px">${escHtml(a.treatment)}</div>
        ${a.client_phone?`<div style="font-size:12px;color:${p.c};opacity:.7;margin-top:4px">📞 ${escHtml(a.client_phone)}</div>`:''}
        ${a.client_email?`<div style="font-size:12px;color:${p.c};opacity:.7;margin-top:2px">📧 ${escHtml(a.client_email)}</div>`:''}
      </div>
      <div class="info-grid">
        <div class="info-field"><span class="info-label">${t('date')}</span><span class="info-value">${fmtFull(a.date)}</span></div>
        <div class="info-field"><span class="info-label">${t('time')}</span><span class="info-value">${a.time}</span></div>
        <div class="info-field"><span class="info-label">${t('duration')}</span><span class="info-value">${a.duration} דקות</span></div>
        <div class="info-field"><span class="info-label">${t('status')}</span><span class="info-value">${{pending:'⏳ ממתין',confirmed:'✅ מאושר',done:'הסתיים'}[a.status]||'מאושר'}</span></div>
      </div>
      ${a.notes?`<div class="sec-label">הערות</div><div class="card" style="margin-bottom:12px">${escHtml(a.notes)}</div>`:''}
      <div class="ma">
        ${a.status==='pending'?`<button class="btn btn-success btn-sm" onclick="confirmAppt('${a.id}')"><i class="ti ti-check"></i> ${t('approve')}</button><button class="btn btn-danger btn-sm" onclick="cancelAppt('${a.id}')"><i class="ti ti-x"></i> ${t('reject')}</button>`:''}
        <button class="btn btn-secondary btn-sm" onclick="editAppt('${a.id}')"><i class="ti ti-edit"></i> ${t('edit')}</button>
        <button class="btn btn-success btn-sm" style="background:#25D366;border-color:#25D366;color:#fff" onclick="sendManageLink('${a.id}')"><i class="ti ti-brand-whatsapp"></i> ${t('manageLink')}</button>
        <button class="btn btn-secondary btn-sm" onclick="showLinkClient('${a.id}')"><i class="ti ti-user-plus"></i> ${t('link')}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteAppt('${a.id}')"><i class="ti ti-trash"></i></button>
        <button class="btn btn-google btn-sm" onclick="exportApptToGoogle('${a.id}')"><i class="ti ti-brand-google"></i></button>
        <button class="btn btn-primary" onclick="closeModal()">${t('close')}</button>
      </div>
    </div></div>`;
  }
  return'';
}

// ACTIONS
function toggleSidebar(){S.sidebarOpen=!S.sidebarOpen;const sb=document.getElementById('sidebar');const ov=document.querySelector('.sidebar-overlay');if(sb){sb.classList.toggle('open',S.sidebarOpen);ov&&ov.classList.toggle('show',S.sidebarOpen)}}
function closeSidebar(){S.sidebarOpen=false;renderRoot()}
function searchToClients(){if(S.activePage!=='clients'||!S.clientListView){S.activePage='clients';S.clientListView=true;renderRoot();const inp=document.querySelector('#clients-list-container');setTimeout(()=>{const si=document.querySelector('#clients-list-container');},10);}else{reClientsList();}}
function selectClient(id){S.activeId=id;S.activePage='clients';S.activeTab='overview';S.clientListView=false;S.sidebarOpen=false;renderRoot()}
function gotoPage(p){S.activePage=p;if(p==='clients')S.clientListView=true;S.sidebarOpen=false;renderRoot()}
function setTab(t){S.activeTab=t;renderRoot()}
function showModal(type){S.modal=type;S.newSrc='';renderRoot()}
function closeModal(){S.modal=null;S.prefillDate='';S.prefillTime='';S.sendForm=null;S.viewForm=null;S.editUser=null;renderRoot()}
function closeModalBg(e){if(e.target===e.currentTarget)closeModal()}
function selectSrc(k){S.newSrc=k;document.querySelectorAll('.source-opt').forEach(el=>{el.classList.toggle('selected',el.getAttribute('onclick').includes("'"+k+"'"))})}
function showApptDetail(id){S.modal='appt-'+id;renderRoot()}
function editAppt(id){S.modal='editappt-'+id;renderRoot()}
async function saveEditAppt(aid){
  const body={
    client_name:document.getElementById('ea-name').value.trim(),
    client_phone:document.getElementById('ea-phone').value.trim(),
    client_email:document.getElementById('ea-email').value.trim(),
    treatment:document.getElementById('ea-treat').value.trim()||'טיפול',
    date:document.getElementById('ea-date').value,
    time:document.getElementById('ea-time').value,
    duration:parseInt(document.getElementById('ea-dur').value)||60,
    notes:document.getElementById('ea-notes').value.trim(),
    status:document.getElementById('ea-status').value
  };
  if(!body.client_name||!body.date||!body.time){alert(t('aFillNameDateTime'));return}
  await sbPatch('appointments',`?id=eq.${aid}`,body);

async function saveAppt(){
  const name=(document.getElementById('a-name')||{}).value||'';
  const phone=(document.getElementById('a-phone')||{}).value||'';
  const email=(document.getElementById('a-email')||{}).value||'';
  const treat=document.getElementById('a-treat').value.trim();
  const date=document.getElementById('a-date').value;
  const time=document.getElementById('a-time').value;
  const dur=parseInt(document.getElementById('a-dur').value)||60;

  if(!date||!time){alert(t('aFillDateTime'));return}
  const body={client_name:name.trim(),client_phone:phone.trim(),client_email:email.trim(),treatment:treat||'טיפול',date,time,duration:dur,notes,status:'confirmed'};
  // אם נכנסים ללקוח וקובעים תור — שייך אותו ללקוח

// GOOGLE CALENDAR
function padZ(n){return String(n).padStart(2,'0')}
function toICS(dateStr,timeStr){const[y,m,d]=dateStr.split('-');const[h,min]=timeStr.split(':');return`${y}${padZ(m)}${padZ(d)}T${padZ(h)}${padZ(min)}00`}
function dlICS(ics,filename){const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function exportApptToGoogle(id){const a=S.appointments.find(x=>x.id===id);if(!a)return;const cname=a.client_name||getClientName(a.client_id);const[h,min]=a.time.split(':').map(Number);const tot=h*60+min+(a.duration||60);const end=`${padZ(Math.floor(tot/60))}:${padZ(tot%60)}`;const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Clinic CRM//HE\r\nBEGIN:VEVENT\r\nUID:appt-${a.id}@clinic\r\nDTSTART:${toICS(a.date,a.time)}\r\nDTEND:${toICS(a.date,end)}\r\nSUMMARY:${cname} — ${a.treatment}\r\nEND:VEVENT\r\nEND:VCALENDAR`;dlICS(ics,`tor-${a.date}.ics`);toast(t('tExportGoogle'))}
function exportWeekToGoogle(){const dates=Array.from({length:7},(_,i)=>fmtDate(addDays(S.calWeek,i)));const appts=S.appointments.filter(a=>dates.includes(a.date));if(!appts.length){toast(t('tNoApptsWeek'));return}let events='';appts.forEach(a=>{const cname=a.client_name||getClientName(a.client_id);const[h,min]=a.time.split(':').map(Number);const tot=h*60+min+(a.duration||60);const end=`${padZ(Math.floor(tot/60))}:${padZ(tot%60)}`;events+=`BEGIN:VEVENT\r\nUID:appt-${a.id}@clinic\r\nDTSTART:${toICS(a.date,a.time)}\r\nDTEND:${toICS(a.date,end)}\r\nSUMMARY:${cname} — ${a.treatment}\r\nEND:VEVENT\r\n`;});dlICS(`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Clinic CRM//HE\r\n${events}END:VCALENDAR`,`clinic-week.ics`);toast(`📅 ${appts.length} תורים יוצאו!`)}

async function uploadClientPhoto(input){
  const file = input.files[0];
  if(!file)return;
  const c = getC();if(!c)return;
  const statusEl = document.getElementById('photo-status');
  if(statusEl)statusEl.textContent = 'מעלה תמונה…';

  // Check size (max 5MB)
  if(file.size > 5*1024*1024){
    if(statusEl)statusEl.textContent = 'הקובץ גדול מדי (מקסימום 5MB)';
    return;
  }

  const ext = file.name.split('.').pop();
  const filename = `${c.id}-${Date.now()}.${ext}`;

  try{
    // Upload to Supabase Storage
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/clinic-photos/${filename}`,{
      method:'POST',
      headers:{
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });

    if(!res.ok){
      const err = await res.text();
      console.error('Upload error:', err);
      if(statusEl)statusEl.textContent = 'שגיאה בהעלאה';
      return;
    }

    // Get public URL
    const photoUrl = `${SUPABASE_URL}/storage/v1/object/public/clinic-photos/${filename}`;

    // Save URL to client record
    await sbPatch('clients', `?id=eq.${c.id}`, {photo_url: photoUrl});
    S.clients = S.clients.map(x => x.id===c.id ? {...x, photo_url: photoUrl} : x);

    if(statusEl)statusEl.textContent = '✓ תמונה הועלתה בהצלחה!';
    renderRoot();
    toast(t('tPhotoUploaded'));
  }catch(e){
    console.error('Photo upload error:', e);
    if(statusEl)statusEl.textContent = 'שגיאה בהעלאה';
  }
}
