
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ד"ר קליניק — מערכת ניהול תורים ולקוחות</title>
<meta name="description" content="ניהול תורים, כרטיסי לקוחות וטפסי הסכמה דיגיטליים. בארבע שפות. לקליניקות בכל העולם.">
<meta name="theme-color" content="#0E2A3F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E2A3F;--clinical:#1B6CA8;--aqua:#4DB8C8;--mint:#2AA876;
  --paper:#F7FAFC;--gold:#C9A84C;--line:#DDE8F0;--muted:#64798C;
  --display:'Frank Ruhl Libre',Georgia,serif;--body:'Heebo',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-wrap:break-word}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}

nav{position:sticky;top:0;z-index:100;background:rgba(247,250,252,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-in{max-width:1120px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:-.01em;white-space:nowrap}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(150deg,var(--clinical),var(--aqua));display:grid;place-items:center;color:#fff;font-size:17px;flex-shrink:0}
.nav-links{display:flex;gap:24px;margin-inline-start:auto;align-items:center}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .15s}
.nav-links a:hover{color:var(--clinical)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:11px;text-align:center;line-height:1.35;font-family:var(--body);font-weight:600;cursor:pointer;text-decoration:none;transition:transform .12s,box-shadow .18s,background .18s;border:none;font-size:15px;padding:13px 24px}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--ink);color:#fff;box-shadow:0 4px 14px rgba(14,42,63,.22)}
.btn-primary:hover{box-shadow:0 8px 22px rgba(14,42,63,.3)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--clinical);color:var(--clinical)}
.btn-sm{padding:9px 16px;font-size:14px}
.nav-cta{display:flex;gap:8px;align-items:center}

.lang{position:relative}
.lang-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1.5px solid var(--line);color:var(--ink);font-size:13.5px;font-weight:600;padding:8px 12px;border-radius:10px;cursor:pointer;font-family:var(--body);transition:border-color .15s}
.lang-btn:hover{border-color:var(--clinical)}
.lang-btn .chev{font-size:8px;opacity:.6;transition:transform .2s}
.lang.open .chev{transform:rotate(180deg)}
.lang-menu{position:absolute;top:calc(100% + 7px);inset-inline-end:0;max-width:min(200px,calc(100vw - 32px));background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(14,42,63,.15);min-width:158px;overflow:hidden;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .17s;z-index:120}
.lang.open .lang-menu{opacity:1;visibility:visible;transform:translateY(0)}
.lang-item{display:flex;align-items:center;gap:9px;padding:11px 14px;font-size:14px;cursor:pointer;direction:ltr;transition:background .12s}
.lang-item:hover{background:var(--paper)}
.lang-item.on{background:rgba(27,108,168,.08);color:var(--clinical);font-weight:600}
.lang-item .ck{margin-inline-start:auto;color:var(--clinical)}

header{padding:70px 0 82px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-180px;inset-inline-start:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(77,184,200,.15),transparent 68%);pointer-events:none}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;position:relative}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--clinical);background:rgba(27,108,168,.09);border:1px solid rgba(27,108,168,.18);padding:6px 13px;border-radius:99px;margin-bottom:22px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mint);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.78)}}
h1{font-family:var(--display);font-size:clamp(36px,5.2vw,58px);line-height:1.09;font-weight:900;letter-spacing:-.022em;margin-bottom:20px}
h1 em{font-style:normal;position:relative;white-space:nowrap}
@media(max-width:620px){h1 em{white-space:normal}}
h1 em::after{content:'';position:absolute;inset-inline:0;bottom:.09em;height:.28em;background:linear-gradient(90deg,rgba(201,168,76,.42),rgba(77,184,200,.32));z-index:-1;border-radius:2px}
.lede{font-size:18px;color:var(--muted);max-width:34ch;margin-bottom:28px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.hero-note{font-size:13.5px;color:var(--muted)}

.ba{direction:ltr;position:relative;border-radius:18px;overflow:hidden;box-shadow:0 22px 60px rgba(14,42,63,.17);border:1px solid var(--line);aspect-ratio:4/3.35;background:#fff;user-select:none;touch-action:pan-y}
.ba-pane{position:absolute;inset:0;display:flex;flex-direction:column;background:#fff}
.ba-after{clip-path:inset(0 0 0 var(--split,50%))}
.ba-head{padding:11px 15px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;flex-shrink:0}
.ba-before{background:#FBF7F4}
.ba-before .ba-head{background:#EFE4DF;color:#8A4B34}
.ba-after{background:#fff}
.ba-after .ba-head{background:linear-gradient(135deg,var(--clinical),var(--aqua));color:#fff}
.ba-body{flex:1;padding:16px 17px;overflow:hidden;position:relative}
html[dir=rtl] .ba-body{direction:rtl}
.notes{position:relative;height:64%}
.note{position:absolute;padding:11px 13px;font-size:12px;line-height:1.45;color:#5A4438;background:#FFFDF5;border:1px solid #E8DFCF;border-radius:3px;box-shadow:0 2px 6px rgba(90,68,56,.12);max-width:74%}
.note::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:26px;height:9px;background:rgba(190,175,150,.5);border-radius:1px}
.n1{top:2%;left:2%;transform:rotate(-2.5deg)}
.n2{top:33%;left:22%;transform:rotate(1.8deg);background:#FFF8F2;border-color:#EDDCCC}
.n3{top:64%;left:6%;transform:rotate(-1.2deg)}
.chaos-note{position:absolute;bottom:14px;left:17px;right:17px;font-size:11.5px;color:#8A4B34;font-weight:600;background:rgba(138,75,52,.08);padding:7px 11px;border-radius:8px}
.mini-cal{display:grid;grid-template-columns:30px repeat(4,1fr);gap:4px;font-size:9px}
.mc-h{text-align:center;font-weight:700;color:var(--muted);padding-bottom:7px;font-size:10px}
.mc-t{color:#AEC0CE;text-align:end;padding-inline-end:5px;font-size:9px;line-height:34px}
.mc-c{background:#F4F9FC;border-radius:5px;height:34px}
.mc-appt{border-radius:6px;padding:4px 6px;font-size:9.5px;font-weight:600;line-height:1.3;overflow:hidden;height:34px;display:flex;flex-direction:column;justify-content:center}
.a1{background:#E7EEFD;color:#2C3B8E}.a2{background:#E3F5EE;color:#0B5140}
.a3{background:#FBEAF0;color:#78243F}.a4{background:#FCF0DE;color:#7A5310}
.ba-stats{display:flex;gap:7px;margin-top:14px}
.stat{flex:1;background:#F4F9FC;border-radius:9px;padding:8px 7px;text-align:center}
.stat b{display:block;font-size:15px;color:var(--clinical);font-family:var(--display);line-height:1.1}
.stat span{font-size:9px;color:var(--muted)}
.ba-handle{position:absolute;top:0;bottom:0;left:var(--split,50%);width:3px;background:#fff;box-shadow:0 0 0 1px rgba(14,42,63,.14),0 0 18px rgba(0,0,0,.14);cursor:ew-resize;z-index:5}
.ba-knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:#fff;box-shadow:0 4px 16px rgba(14,42,63,.26);display:grid;place-items:center;font-size:15px;color:var(--clinical)}
.ba-hint{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);background:rgba(14,42,63,.82);color:#fff;font-size:10.5px;padding:5px 12px;border-radius:99px;z-index:6;pointer-events:none;transition:opacity .3s;white-space:nowrap}

section{padding:76px 0}
.sec-head{max-width:58ch;margin-bottom:44px}
.kicker{font-size:12px;font-weight:700;letter-spacing:.11em;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
h2{font-family:var(--display);font-size:clamp(27px,3.5vw,39px);font-weight:700;letter-spacing:-.018em;line-height:1.17;margin-bottom:13px}
.sec-head p{color:var(--muted);font-size:16.5px}

.langs{background:#fff;border-block:1px solid var(--line);padding:52px 0}
.lang-strip{display:grid;grid-template-columns:1fr auto;gap:38px;align-items:center}
.lang-cards{display:flex;gap:11px;flex-wrap:wrap}
.lang-card{border:1px solid var(--line);border-radius:13px;padding:15px 19px;min-width:118px;background:var(--paper);transition:border-color .18s,transform .18s}
.lang-card:hover{border-color:var(--aqua);transform:translateY(-2px)}
.lang-card .flag{font-size:21px;display:block;margin-bottom:6px}
.lang-card .nm{font-size:14.5px;font-weight:600;direction:ltr}
.lang-card .sm{font-size:11.5px;color:var(--muted);direction:ltr}

.pains{background:var(--ink);color:#fff}
.pains h2{color:#fff}
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.11);border-radius:15px;overflow:hidden}
.pain{background:var(--ink);padding:30px 26px}
.pain-q{font-family:var(--display);font-size:19px;font-weight:500;color:#fff;margin-bottom:11px;line-height:1.35;overflow-wrap:break-word}
.pain-a{font-size:14.5px;color:rgba(255,255,255,.62);line-height:1.65}

.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.feat{background:#fff;border:1px solid var(--line);border-radius:15px;padding:26px 24px;transition:border-color .18s,transform .18s,box-shadow .18s}
.feat:hover{border-color:var(--aqua);transform:translateY(-3px);box-shadow:0 12px 30px rgba(14,42,63,.07)}
.feat-ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;margin-bottom:15px;background:rgba(27,108,168,.08)}
.feat h3{font-family:var(--display);font-size:18.5px;font-weight:700;margin-bottom:8px;overflow-wrap:break-word}
.feat p{font-size:14.5px;color:var(--muted);line-height:1.62}

.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:34px;counter-reset:s}
.step{counter-increment:s;position:relative;padding-top:52px}
.step::before{content:counter(s,decimal-leading-zero);position:absolute;top:0;inset-inline-start:0;line-height:1;font-family:var(--display);font-size:38px;font-weight:900;color:var(--line);line-height:1}
.step h3{font-size:17.5px;font-weight:700;margin-bottom:8px}
.step p{font-size:14.5px;color:var(--muted)}

.price-one{max-width:520px;margin:0 auto;background:#fff;border:2px solid var(--clinical);border-radius:19px;padding:38px 34px;position:relative;box-shadow:0 18px 48px rgba(27,108,168,.13)}
.price-tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--mint);color:#fff;font-size:12px;font-weight:700;padding:5px 15px;border-radius:99px;white-space:nowrap}
.price-one h3{font-family:var(--display);font-size:23px;font-weight:700;margin-bottom:5px;text-align:center}
.price-sub{font-size:14px;color:var(--muted);margin-bottom:24px;text-align:center}
.price-big{font-family:var(--display);font-size:56px;font-weight:900;line-height:1;text-align:center;margin-bottom:4px}
.price-big small{font-size:17px;font-weight:400;color:var(--muted);font-family:var(--body)}
.price-note{font-size:13px;color:var(--muted);text-align:center;margin-bottom:6px}
.price-fx{font-size:11.5px;color:var(--muted);opacity:.75;text-align:center;margin-bottom:24px;min-height:17px}
.price-one ul{list-style:none;margin-bottom:26px;display:grid;gap:11px}
.price-one li{font-size:14.5px;display:flex;gap:10px;align-items:flex-start}
.price-one li::before{content:'✓';color:var(--mint);font-weight:700;flex-shrink:0}
.price-one .btn{width:100%}

.demo{background:linear-gradient(155deg,var(--ink),#164059);color:#fff;border-radius:22px;padding:52px 44px;display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center}
.demo h2{color:#fff;margin-bottom:11px}
.demo>div>p{color:rgba(255,255,255,.68);font-size:16px;margin-bottom:20px}
.demo-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.demo-list li{font-size:14.5px;color:rgba(255,255,255,.86);display:flex;gap:9px}
.demo-list li::before{content:'—';color:var(--gold)}
.form{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:15px;padding:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.78);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.09);color:#fff;font-family:var(--body);font-size:15px;outline:none;transition:border-color .15s}
.field input::placeholder{color:rgba(255,255,255,.4)}
.field input:focus,.field select:focus{border-color:var(--aqua)}
.field select option{background:var(--ink);color:#fff}
.btn-gold{background:var(--gold);color:var(--ink);width:100%;box-shadow:0 4px 14px rgba(201,168,76,.3)}
.btn-gold:hover{background:#D7B65C}
.form-note{font-size:11.5px;color:rgba(255,255,255,.5);text-align:center;margin-top:11px}

footer{border-top:1px solid var(--line);padding:36px 0;margin-top:18px}
.foot{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
.foot p{font-size:13.5px;color:var(--muted)}
.foot-links{display:flex;gap:20px}
.foot-links a{font-size:13.5px;color:var(--muted);text-decoration:none}
.foot-links a:hover{color:var(--clinical)}

/* ---------- tablet ---------- */
@media(max-width:900px){
  .hero,.lang-strip{grid-template-columns:1fr;gap:34px}
  .lede{max-width:none}
  .pain-grid,.feat-grid,.steps,.demo{grid-template-columns:1fr}
  .demo{padding:36px 24px;gap:30px}
  .nav-links{display:none}
  section{padding:54px 0}
  header{padding:42px 0 54px}
  .lang-cards{display:grid;grid-template-columns:repeat(2,1fr)}
  .lang-card{min-width:0}
}

/* ---------- phone ---------- */
@media(max-width:620px){
  .wrap{padding:0 18px}
  .nav-in{padding:11px 16px;gap:9px}
  .logo{font-size:16px;gap:8px}
  .logo-mark{width:30px;height:30px;font-size:15px}
  .nav-cta{margin-inline-start:auto;gap:6px}
  .btn-sm{padding:8px 13px;font-size:13px}
  .lang-btn{padding:7px 9px;font-size:12.5px}
  .lang-btn span:nth-child(2){max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lang-menu{min-width:150px}

  header{padding:32px 0 44px}
  .eyebrow{font-size:11.5px;padding:5px 11px;margin-bottom:16px;line-height:1.35}
  h1{font-size:clamp(28px,8.4vw,36px);line-height:1.14;margin-bottom:15px;overflow-wrap:break-word;hyphens:auto}
  .lede{font-size:16px;margin-bottom:22px}
  .hero-cta{gap:9px;margin-bottom:16px}
  .hero-cta .btn{flex:1 1 100%;padding:14px 18px}
  .hero-note{font-size:12.5px;line-height:1.7}

  /* before/after — roomier on a small screen */
  .ba{aspect-ratio:auto;min-height:390px}
  .ba-head{padding:10px 13px;font-size:11.5px}
  .ba-body{padding:13px 14px}
  .note{font-size:11.5px;padding:9px 11px;max-width:80%}
  .n1{top:1%;left:1%}.n2{top:32%;left:16%}.n3{top:63%;left:3%}
  .chaos-note{font-size:11px;bottom:12px;left:14px;right:14px;padding:6px 9px}
  .mini-cal{grid-template-columns:26px repeat(4,1fr);gap:3px}
  .mc-c,.mc-appt{height:30px}
  .mc-t{line-height:30px;font-size:8.5px}
  .mc-appt{font-size:8.5px;padding:3px 4px}
  .mc-h{font-size:9px}
  .stat b{font-size:13px}
  .stat span{font-size:8px}

  section{padding:44px 0}
  h2{font-size:clamp(23px,6.6vw,30px);overflow-wrap:break-word}
  .sec-head{margin-bottom:30px}
  .sec-head p{font-size:15.5px}
  .kicker{font-size:11px;letter-spacing:.08em}

  .langs{padding:40px 0}
  .lang-cards{gap:9px}
  .lang-card{padding:13px 14px}
  .lang-card .flag{font-size:19px}
  .lang-card .nm{font-size:13.5px}

  .pain{padding:24px 20px}
  .pain-q{font-size:17.5px}
  .pain-a{font-size:14px}
  .feat{padding:22px 20px}
  .feat h3{font-size:17px}
  .feat p{font-size:14px}
  .steps{gap:24px}
  .step{padding-top:44px}
  .step::before{font-size:32px}

  .price-one{padding:32px 22px;border-radius:16px}
  .price-tag{font-size:11px;padding:4px 12px;white-space:normal;text-align:center;max-width:88%}
  .price-big{font-size:46px}
  .price-one li{font-size:14px}

  .demo{padding:30px 20px;border-radius:18px;gap:26px}
  .form{padding:20px 17px}
  .field input,.field select{font-size:16px}   /* 16px stops iOS zoom-on-focus */

  .foot{flex-direction:column;text-align:center;gap:14px}
  .foot-links{gap:16px;flex-wrap:wrap;justify-content:center}
}

/* ---------- very small phones ---------- */
@media(max-width:470px){
  .nav-cta .btn-ghost{display:none}            /* login still in the footer */
}
@media(max-width:380px){
  .logo span[data-t=brand]{display:none}       /* mark only, saves room */
  .lang-btn span:nth-child(2){display:none}    /* globe + chevron only */
  h1{font-size:26px}
  .price-big{font-size:40px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2.5px solid var(--aqua);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <div class="logo"><span class="logo-mark">✦</span> <span data-t="brand"></span></div>
    <div class="nav-links">
      <a href="#why" data-t="navWhy"></a>
      <a href="#features" data-t="navFeatures"></a>
      <a href="#how" data-t="navHow"></a>
      <a href="#pricing" data-t="navPricing"></a>
    </div>
    <div class="nav-cta">
      <div class="lang" id="lang">
        <button class="lang-btn" onclick="event.stopPropagation();toggleLang()">
          <span>🌐</span><span id="langNow"></span><span class="chev">▼</span>
        </button>
        <div class="lang-menu" id="langMenu"></div>
      </div>
      <a href="index.html" class="btn btn-ghost btn-sm" data-t="navLogin"></a>
      <a href="#demo" class="btn btn-primary btn-sm" data-t="navStart"></a>
    </div>
  </div>
</nav>

<header>
  <div class="wrap hero">
    <div>
      <span class="eyebrow"><span class="dot"></span> <span data-t="heroEyebrow"></span></span>
      <h1><span data-t="h1a"></span> <em data-t="h1em"></em><span data-t="h1b"></span></h1>
      <p class="lede" data-t="lede"></p>
      <div class="hero-cta">
        <a href="#demo" class="btn btn-primary" data-t="ctaMain"></a>
        <a href="#" onclick="waDirect();return false;" class="btn btn-ghost" data-t="ctaDemo"></a>
      </div>
      <p class="hero-note" data-t="heroNote"></p>
    </div>

    <div class="ba" id="ba">
      <div class="ba-pane ba-before">
        <div class="ba-head">📱 <span data-t="baBefore"></span></div>
        <div class="ba-body">
          <div class="notes">
            <div class="note n1"><span data-t="m1"></span></div>
            <div class="note n2"><span data-t="m2"></span></div>
            <div class="note n3"><span data-t="m3"></span></div>
          </div>
          <div class="chaos-note" data-t="chaosNote"></div>
        </div>

const LANGS=[{c:'he',n:'עברית',f:'🇮🇱'},{c:'ru',n:'Русский',f:'🇷🇺'},{c:'ka',n:'ქართული',f:'🇬🇪'},{c:'en',n:'English',f:'🇬🇧'}];

function detect(){
  try{const s=localStorage.getItem('clinic_lang');if(s&&T[s])return s;}catch(e){}
  const n=(navigator.language||'en').toLowerCase();
  if(n.startsWith('ru'))return 'ru';
  if(n.startsWith('ka'))return 'ka';
  if(n.startsWith('he')||n.startsWith('iw'))return 'he';
  return 'en';
}
let L=detect();

function toggleLang(){document.getElementById('lang').classList.toggle('open');}
function setLang(l){
  L=l;try{localStorage.setItem('clinic_lang',l);}catch(e){}
  document.getElementById('lang').classList.remove('open');
  render();
}
document.addEventListener('click',()=>{const e=document.getElementById('lang');if(e)e.classList.remove('open');});

const PRICE_ILS=299;
let fxRate=null;          // ILS -> USD

function renderPrice(){
  const d=T[L];
  const el=document.getElementById('priceVal');
  const fx=document.getElementById('priceFx');
  if(!el)return;
  if(L==='he'){
    el.textContent='₪'+PRICE_ILS;
    fx.textContent='';
    return;
  }
  if(fxRate){
    const usd=Math.round(PRICE_ILS*fxRate);
    el.textContent='$'+usd;
    fx.textContent=(d.fxNote||'').replace('{ils}','₪'+PRICE_ILS);
  }else{
    el.textContent='₪'+PRICE_ILS;
    fx.textContent='';
  }
}

function loadFx(){
  fetch('https://api.frankfurter.app/latest?from=ILS&to=USD')
    .then(r=>r.json())
    .then(j=>{ if(j&&j.rates&&j.rates.USD){ fxRate=j.rates.USD; renderPrice(); } })
    .catch(()=>{});
}

function render(){
  const d=T[L];
  document.documentElement.lang=L;
  document.documentElement.dir=d.dir;
  document.title=d.brand+' — '+d.heroEyebrow;

  document.querySelectorAll('[data-t]').forEach(el=>{
    const v=d[el.getAttribute('data-t')];
    if(typeof v==='string')el.textContent=v;
  });

  const cur=LANGS.find(x=>x.c===L);
  document.getElementById('langNow').textContent=cur?cur.n:'';
  document.getElementById('langMenu').innerHTML=LANGS.map(l=>
    '<div class="lang-item '+(l.c===L?'on':'')+'" onclick="event.stopPropagation();setLang(\''+l.c+'\')"><span>'+l.f+'</span><span>'+l.n+'</span>'+(l.c===L?'<span class="ck">✓</span>':'')+'</div>'
  ).join('');

  document.getElementById('f-type').innerHTML=d.types.map(t=>'<option>'+t+'</option>').join('');

  const N=d.names,R=d.tr;
  const cell=(cls,i,j)=>'<div class="mc-appt '+cls+'">'+N[i]+'<br>'+R[j]+'</div>';
  const e='<div class="mc-c"></div>';
  document.getElementById('miniCal').innerHTML=
    '<div></div>'+d.days.map(x=>'<div class="mc-h">'+x+'</div>').join('')+
    '<div class="mc-t">09:00</div>'+cell('a1',0,0)+e+e+cell('a3',1,1)+
    '<div class="mc-t">11:00</div>'+e+cell('a2',2,2)+e+e+
    '<div class="mc-t">13:00</div>'+e+e+cell('a4',4,3)+e;

  renderPrice();
}

(function(){
  const ba=document.getElementById('ba'),hint=document.getElementById('hint');
  let drag=false,touched=false;
  function set(p){
    p=Math.max(6,Math.min(94,p));
    ba.style.setProperty('--split',p+'%');
  }
  function at(e){
    const r=ba.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    set(x/r.width*100);
    if(!touched){touched=true;if(hint)hint.style.opacity='0';}
  }
  ba.addEventListener('mousedown',e=>{drag=true;at(e);});
  window.addEventListener('mousemove',e=>{if(drag)at(e);});
  window.addEventListener('mouseup',()=>{drag=false;});
  ba.addEventListener('touchstart',e=>{drag=true;at(e);},{passive:true});
  ba.addEventListener('touchmove',e=>{if(drag)at(e);},{passive:true});
  ba.addEventListener('touchend',()=>{drag=false;});
  set(50);
  if(!matchMedia('(prefers-reduced-motion: reduce)').matches){
    let p=50,dir=-1,n=0;
    const iv=setInterval(()=>{
      if(touched){clearInterval(iv);return;}
      p+=dir*0.9;n++;
      if(p<=34||p>=66)dir*=-1;
      set(p);
      if(n>150){clearInterval(iv);set(50);}
    },26);
  }
})();
